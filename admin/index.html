<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Franjo Nutrición</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<div class="login-page">
  <div class="login-bg-glow"></div>

  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L3 7l9 5 9-5-9-5zM3 17l9 5 9-5M3 12l9 5 9-5"/>
        </svg>
      </div>
      <h1>Franjo Nutrición</h1>
      <p>Panel de Administración</p>
    </div>

    <div id="loginError" class="login-error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@correo.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">
        Ingresar
      </button>
    </form>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js"></script>
<script>
  // LOGIN LOGIC
  const form = document.getElementById('loginForm');
  const errorBox = document.getElementById('loginError');
  const loginBtn = document.getElementById('loginBtn');

  // Si ya hay sesión activa, redirigir al dashboard
  (async () => {
    await supabaseReady;
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) window.location.href = 'dashboard.html';
  })();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.classList.remove('show');
    loginBtn.disabled = true;
    loginBtn.textContent = 'Ingresando…';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { error } = await _supabase.auth.signInWithPassword({ email, password });

    if (error) {
      errorBox.textContent = traducirError(error.message);
      errorBox.classList.add('show');
      loginBtn.disabled = false;
      loginBtn.textContent = 'Ingresar';
    } else {
      window.location.href = 'dashboard.html';
    }
  });

  function traducirError(msg) {
    if (msg.includes('Invalid login')) return 'Correo o contraseña incorrectos.';
    if (msg.includes('Email not confirmed')) return 'Confirma tu correo antes de ingresar.';
    if (msg.includes('Too many requests')) return 'Demasiados intentos. Espera unos minutos.';
    return 'Error al ingresar. Intenta de nuevo.';
  }
</script>
</body>
</html>
