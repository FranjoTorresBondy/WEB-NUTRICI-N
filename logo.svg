<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" role="img" aria-label="FTB Sports Nutrition">

  <!-- ═══ BRAIN + CIRCUIT ICON ─ centered at 120,112 ═══ -->
  <g transform="translate(20,8) scale(2)" color="#FFFFFF" fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">

    <!-- Outer ring — thin, precise -->
    <circle cx="50" cy="52" r="44" stroke-width="1.1"/>

    <!-- ── LEFT HEMISPHERE · organic contour ── -->
    <path stroke-width="1.5" d="
      M 50,11
      C 44,10 37,12 30,17
      C 23,22 17,30 14,39
      C 11,48 12,57 17,65
      C 21,72 28,77 36,80
      C 41,83 46,84 50,84
    "/>

    <!-- Gyri: upper fold -->
    <path stroke-width="0.9" stroke-opacity="0.75" d="
      M 42,11
      C 34,15 27,21 25,29
      C 23,36 25,43 31,46
    "/>

    <!-- Gyri: mid fold -->
    <path stroke-width="0.9" stroke-opacity="0.75" d="
      M 13,51
      C 12,59 15,66 21,71
    "/>

    <!-- Gyri: lower fold -->
    <path stroke-width="0.9" stroke-opacity="0.75" d="
      M 30,76
      C 35,81 42,84 48,84
    "/>

    <!-- Hemisphere divider (faint) -->
    <line x1="50" y1="11" x2="50" y2="84" stroke-width="0.5" stroke-opacity="0.2"/>

    <!-- ── RIGHT HEMISPHERE · circuit board ── -->

    <!-- Vertical spine (right side) -->
    <line stroke-width="1.3" x1="50" y1="11" x2="50" y2="84"/>

    <!-- Branch 1 · top → node up-right -->
    <polyline stroke-width="1.5" points="50,22 67,22 67,13"/>
    <!-- Branch 2 · mid-upper → node far right -->
    <polyline stroke-width="1.5" points="50,36 59,36 59,22"/>
    <polyline stroke-width="1.5" points="59,36 78,36"/>
    <!-- Branch 3 · center → node right -->
    <polyline stroke-width="1.5" points="50,52 67,52 67,36"/>
    <line stroke-width="1.5" x1="67" y1="52" x2="79" y2="52"/>
    <!-- Branch 4 · lower → L-node -->
    <polyline stroke-width="1.5" points="50,66 63,66 63,76 55,76"/>
    <!-- Branch 5 · bottom micro -->
    <line stroke-width="1.5" x1="50" y1="79" x2="60" y2="79"/>

    <!-- Circuit endpoint nodes (filled dots) -->
    <circle cx="67" cy="13" r="2.8" fill="#FFFFFF" stroke="none"/>
    <circle cx="78" cy="36" r="2.8" fill="#FFFFFF" stroke="none"/>
    <circle cx="79" cy="52" r="2.8" fill="#FFFFFF" stroke="none"/>
    <circle cx="55" cy="76" r="2.8" fill="#FFFFFF" stroke="none"/>
    <circle cx="60" cy="79" r="2.8" fill="#FFFFFF" stroke="none"/>

  </g>

  <!-- ═══ TYPOGRAPHY ═══ -->

  <!-- FTB · grande, espaciado -->
  <text
    x="120" y="208"
    font-family="'Chakra Petch', 'Arial Narrow', sans-serif"
    font-size="38"
    font-weight="600"
    letter-spacing="10"
    text-anchor="middle"
    fill="#FFFFFF"
  >FTB</text>

  <!-- Línea separadora -->
  <line x1="40" y1="218" x2="200" y2="218" stroke="#FFFFFF" stroke-width="0.6" stroke-opacity="0.25"/>

  <!-- SPORTS NUTRITION · pequeño, tracking amplio -->
  <text
    x="120" y="238"
    font-family="'Chakra Petch', 'Arial Narrow', sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="5"
    text-anchor="middle"
    fill="#A0A0A0"
  >SPORTS NUTRITION</text>

</svg>
