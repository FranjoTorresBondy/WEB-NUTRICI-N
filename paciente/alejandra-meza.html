@media(max-width:640px){

@media(max-width:400px){

const ANTRO_KEY = () => `${PATIENT.slug}-antro-v1`;
function getAntroBase() {
  const a = PATIENT.antro;

  const s8 = +(s6+a.bi+a.cresta).toFixed(1);
  return [{ fecha:a.fecha, peso:a.peso, tri:a.tri, bi:a.bi, sub:a.sub, cresta:a.cresta, supra:a.supra, abd:a.abd, pierna:a.pierna, pant:a.pant, brazRelaj:a.brazRelaj, brazFlex:a.brazFlex, abdom:a.abdom, cadera:a.cadera, muslo:a.muslo, pantPer:a.pantPer, s6, s8 }];
}
function getAntroData() { try { const r=localStorage.getItem(ANTRO_KEY()); return r?JSON.parse(r):getAntroBase(); } catch { return getAntroBase(); } }
function saveAntroData(d) { localStorage.setItem(ANTRO_KEY(), JSON.stringify(d)); }

let antroInited=false;
function initAntro() {
  if(antroInited)return; antroInited=true;
  $('tab-evol-antro').innerHTML = `<div class="wrap"><section style="padding-top:24px">
    <div class="sec-h"><span class="ix">01</span><h2>Evolución Física</h2><div class="rule"></div></div>
    <div class="card" style="max-width:600px;text-align:center;padding:40px 22px">
      <p style="font-size:28px;margin-bottom:16px">📸</p>
      <p style="font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:18px;color:var(--ink);margin-bottom:10px">Registro fotográfico de progreso</p>
      <p style="font-size:13px;color:var(--muted)">Próximamente disponible — podrás subir tu foto semanal y ver la evolución comparativa semana a semana.</p>
    </div>
    <div class="eval-form" style="max-width:400px;margin-top:24px">
      <h3>Registro de peso semanal</h3>
      <div class="form-grid" style="grid-template-columns:1fr 1fr">
        <div class="form-field"><label>Fecha</label><input type="date" id="f-fecha"></div>
        <div class="form-field"><label>Peso (kg)</label><input type="number" step="0.1" id="f-peso" placeholder="51.0"></div>
      </div>
      <button class="btn-add" onclick="addWeightEntry()">+ Guardar peso</button>
    </div>
    <div id="weightHistory" style="margin-top:24px"></div>
  </section></div>`;
  loadWeightHistory();
}

function addWeightEntry() {
  const fecha = document.getElementById('f-fecha')?.value;
  const peso = parseFloat(document.getElementById('f-peso')?.value);
  if (!fecha || isNaN(peso)) { alert('Ingresa fecha y peso'); return; }
  const key = `${PATIENT.slug}-weights`;
  const data = JSON.parse(localStorage.getItem(key)||'[]');
  data.push({ fecha: fecha.split('-').reverse().join('.'), peso });
  data.sort((a,b)=>a.fecha.split('.').reverse().join('').localeCompare(b.fecha.split('.').reverse().join('')));
  localStorage.setItem(key, JSON.stringify(data));
  document.getElementById('f-fecha').value='';
  document.getElementById('f-peso').value='';
  loadWeightHistory();
  flashSave();
}

function loadWeightHistory() {
  const el = document.getElementById('weightHistory'); if(!el) return;
  const key = `${PATIENT.slug}-weights`;
  const data = JSON.parse(localStorage.getItem(key)||'[]');
  if (!data.length) { el.innerHTML=''; return; }
  el.innerHTML = `<div class="chart-card"><h3>Evolución de peso</h3><div class="cap">kg por semana</div><div class="chart-wrap"><canvas id="cPesoVirtual"></canvas></div></div>
    <div class="tbl-scroll" style="margin-top:16px"><table class="antro-table"><thead><tr><th>Fecha</th><th>Peso kg</th></tr></thead><tbody>
    ${[...data].reverse().map(d=>`<tr><td>${d.fecha}</td><td>${d.peso}</td></tr>`).join('')}</tbody></table></div>`;
  const ctx=document.getElementById('cPesoVirtual'); if(!ctx)return;
  if(ctx._ch)ctx._ch.destroy();
  ctx._ch=new Chart(ctx,{type:'line',data:{labels:data.map(d=>d.fecha),datasets:[{label:'Peso kg',data:data.map(d=>d.peso),borderColor:'#C4973A',pointBackgroundColor:'#C4973A',tension:.35,pointRadius:5,borderWidth:2,fill:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:12,padding:14,color:'#888'}}},
    scales:{x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#666'}},y:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#666'}}}}});
}

function showTab(id,btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  $('tab-'+id)?.classList.add('active');
  btn.classList.add('active');
}

let currentMicro=1, saveTimer=null;
function setMicro(n,btn){
  saveSelections();currentMicro=n;
  document.querySelectorAll('.micro-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');loadSelections();
}

function initOpts(){
  document.querySelectorAll('.opt').forEach(opt=>{
    opt.dataset.count='0';
    const cb=opt.querySelector('.cb');
    const textSpan=document.createElement('span');textSpan.className='opt-text';
    Array.from(opt.childNodes).forEach(n=>{if(n!==cb)textSpan.appendChild(n);});
    opt.appendChild(textSpan);
    const ctrl=document.createElement('span');ctrl.className='opt-ctrl';
    ctrl.innerHTML=`<button class="opt-btn opt-dec" tabindex="-1">−</button><span class="opt-cnt">0</span><button class="opt-btn opt-inc" tabindex="-1">+</button>`;
    opt.appendChild(ctrl);
    ctrl.querySelector('.opt-dec').addEventListener('click',e=>{e.stopPropagation();decrOpt(opt);});
    ctrl.querySelector('.opt-inc').addEventListener('click',e=>{e.stopPropagation();incrOpt(opt);});
    opt.addEventListener('click',()=>incrOpt(opt));
    updateOpt(opt);
  });
}
function groupTotal(g){let t=0;g.querySelectorAll('.opt').forEach(o=>t+=parseInt(o.dataset.count||0));return t;}
function incrOpt(opt){const g=opt.closest('.options');const max=parseInt(g.dataset.max)||1;if(groupTotal(g)>=max)return;opt.dataset.count=parseInt(opt.dataset.count||0)+1;updateOpt(opt);saveSelections();}
function decrOpt(opt){const c=parseInt(opt.dataset.count||0);if(c<=0)return;opt.dataset.count=c-1;updateOpt(opt);saveSelections();}
function updateOpt(opt){const c=parseInt(opt.dataset.count||0);opt.classList.toggle('selected',c>0);const cb=opt.querySelector('.cb');if(cb)cb.textContent=c>0?c:'';const cnt=opt.querySelector('.opt-cnt');if(cnt)cnt.textContent=c;const dec=opt.querySelector('.opt-dec');if(dec)dec.disabled=c<=0;}

function planKey(){return `${PATIENT.slug}-plan-s${currentMicro}`;}
function saveSelections(){const data={};document.querySelectorAll('.options').forEach(g=>{const gid=g.dataset.group;data[gid]={};g.querySelectorAll('.opt').forEach((o,i)=>{const c=parseInt(o.dataset.count||0);if(c>0)data[gid][i]=c;});});localStorage.setItem(planKey(),JSON.stringify(data));}
function loadSelections(){const raw=localStorage.getItem(planKey());document.querySelectorAll('.opt').forEach(o=>{o.dataset.count='0';updateOpt(o);});if(!raw)return;try{const data=JSON.parse(raw);document.querySelectorAll('.options').forEach(g=>{const gid=g.dataset.group;if(!data[gid])return;const opts=g.querySelectorAll('.opt');Object.entries(data[gid]).forEach(([idx,count])=>{if(opts[idx]){opts[idx].dataset.count=count;updateOpt(opts[idx]);}});});}catch(e){}}

function flashSave(){const ind=$('saveind');if(!ind)return;$('saveTxt').textContent='Guardado';ind.classList.add('show');clearTimeout(saveTimer);saveTimer=setTimeout(()=>ind.classList.remove('show'),1800);}

renderHero();
renderTabs();
renderPlan();
renderEval();
renderSpecs();
