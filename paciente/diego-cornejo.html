<style>

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;

.wrap{max-width:1180px;margin:0 auto;padding:0 28px;position:relative;z-index:2}
header.hero{padding:60px 0 22px}

.panel{display:none;animation:fade .5s ease}

section{padding:30px 0}

.macros .kcal{font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:32px;color:var(--amber)}

.macros .sep{flex:1}
.tag{display:inline-block;font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#000;background:var(--navy);padding:5px 12px;border-radius:999px;font-weight:700}
.meals{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}

.meal{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.meal .top{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line);background:var(--panel2)}
.meal .top .nm{font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:19px}
.meal .top .mac{font-family:'IBM Plex Mono';font-size:11px;color:var(--muted);text-align:right;line-height:1.5}
.meal .top .mac b{color:var(--amber)}
.meal .body{padding:14px 20px 18px}
.pick{margin:10px 0}
.pick .k{font-family:'IBM Plex Mono';font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);font-weight:600;margin-bottom:6px}
.options{display:flex;flex-direction:column;gap:4px}
.opt{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:9px;cursor:pointer;transition:.15s;border:1.5px solid transparent;font-size:12.5px;color:var(--muted);line-height:1.4;user-select:none}
.opt:hover{background:var(--bg2)}
.opt.selected{background:rgba(196,151,58,.1);border-color:rgba(196,151,58,.3);color:var(--ink)}
.opt .cb{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s;background:var(--panel);font-family:'IBM Plex Mono';font-size:11px;font-weight:700}
.opt.selected .cb{background:var(--navy);border-color:var(--navy);color:#000}
.opt-text{flex:1;min-width:0}
.opt-ctrl{display:flex;align-items:center;gap:5px;margin-left:auto;flex-shrink:0}
.opt-btn{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;font-weight:600;line-height:1;padding:0}
.opt-btn:hover{border-color:var(--navy);color:var(--navy)}
.opt-btn:disabled{opacity:.25;cursor:default}
.opt-cnt{font-family:'IBM Plex Mono';font-size:14px;font-weight:700;min-width:20px;text-align:center;color:var(--navy)}
.meal .note2{font-size:11.5px;color:var(--faint);font-style:italic;margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
.evalwrap{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:760px){.evalwrap{grid-template-columns:1fr}}
.evgroup{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.evgroup .gh{background:var(--panel2);padding:11px 16px;font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--navy)}
.evgroup .row{display:flex;justify-content:space-between;padding:9px 16px;font-size:13px;border-top:1px solid var(--line)}
.evgroup .row span:first-child{color:var(--muted)}
.evgroup .row span:last-child{font-family:'IBM Plex Mono';font-weight:600;color:var(--ink)}
.evgroup .row.bold span{font-weight:700}
.evgroup .row.bold span:last-child{color:var(--coral)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px;box-shadow:var(--shadow)}
.obj li{font-size:13.5px;color:var(--ink);margin:8px 0 8px 4px;list-style:none;padding-left:22px;position:relative}
.obj li::before{content:"→";position:absolute;left:0;color:var(--navy);font-weight:800}
.specs{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:760px){.specs{grid-template-columns:1fr}}
.spec{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow)}
.spec h4{font-family:'Libre Franklin',sans-serif;font-size:15px;font-weight:600;color:var(--navy);margin-bottom:10px}
.spec ul{list-style:none}
.spec li{font-size:12.5px;color:var(--muted);margin:7px 0;padding-left:16px;position:relative}
.spec li::before{content:"•";position:absolute;left:0;color:var(--faint)}
.spec li b{color:var(--ink);font-weight:600}
.spec .sub-title{font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--navy);margin:12px 0 6px;font-weight:600}
.vinag-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:760px){.vinag-grid{grid-template-columns:1fr}}
.vinag{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 20px;box-shadow:var(--shadow)}
.vinag .vname{font-family:'Libre Franklin',sans-serif;font-size:14px;font-weight:600;color:var(--navy);margin-bottom:6px}
.vinag .vdesc{font-size:12.5px;color:var(--muted);line-height:1.5}
.note{font-size:12px;color:var(--muted);background:var(--panel2);border:1px dashed var(--line);border-radius:12px;padding:14px 16px;margin:18px 0}
.note b{color:var(--ink)}
.hydro{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-top:6px}
.hcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px;text-align:center;box-shadow:var(--shadow)}
.hcard .l{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.hcard .b{font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:38px;color:var(--cyan);margin-top:8px}
.saveind{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:9px 18px;font-family:'IBM Plex Mono';font-size:12px;color:var(--ink);box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:80;transition:transform .3s;display:flex;align-items:center;gap:8px}

.saveind .sdot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.chart-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px;box-shadow:var(--shadow);margin-bottom:16px}
.chart-card h3{font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:16px;color:var(--ink);margin-bottom:4px}
.chart-card .cap{font-size:12px;color:var(--faint);margin-bottom:16px}
.chart-wrap{position:relative;height:220px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
@media(max-width:640px){.chart-grid{grid-template-columns:1fr}}
.kpi-row{display:flex;flex-wrap:wrap;gap:12px;margin:16px 0}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 18px;flex:1;min-width:120px;box-shadow:var(--shadow)}
.kpi .kv{font-family:'Chakra Petch',sans-serif;font-size:24px;font-weight:700;color:var(--navy)}
.kpi .kl{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:4px}
.kpi .kd{font-size:12px;margin-top:4px}
.kpi .kd.up{color:var(--green)} .kpi .kd.down{color:var(--coral)}
.eval-form{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-top:20px}
.eval-form h3{font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:16px;color:var(--ink);margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}

.btn-add{margin-top:16px;background:var(--navy);color:#000;border:none;border-radius:10px;padding:10px 22px;font-family:'IBM Plex Mono';font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:.2s}

.antro-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:16px}

.tbl-scroll{overflow-x:auto;border-radius:12px;border:1px solid var(--line)}
.train-selector{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}

.session-head .sarrow{font-size:12px;color:var(--faint);transition:.2s}
.session-block.open .sarrow{transform:rotate(180deg)}
.session-body{display:none;overflow-x:auto}
.session-block.open .session-body{display:block}

.train-table th{background:var(--panel2);color:var(--faint);font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:center}
.train-table th:first-child{text-align:left;min-width:220px}

.train-table td:first-child{text-align:left;color:var(--muted);font-size:12.5px}
.train-table tr:last-child td{border-bottom:none}
.train-table td.mono{font-family:'IBM Plex Mono';color:var(--navy);font-weight:600}
.train-table td.rir{font-family:'IBM Plex Mono';font-size:11px;color:var(--cyan)}
.log-input{width:72px;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:5px 7px;color:var(--ink);font-family:'IBM Plex Mono';font-size:11px;text-align:center}
.log-input:focus{outline:none;border-color:var(--navy)}
footer{padding:40px 0;border-top:1px solid var(--line);margin-top:20px}
.foot-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.foot-brand{font-family:'IBM Plex Mono';font-size:11px;color:var(--faint);letter-spacing:.1em}
.foot-contact{font-size:12px;color:var(--faint)}
@media(max-width:640px){
  .wrap{padding:0 16px}
  header.hero{padding:32px 0 16px}
  section{padding:20px 0}
  .tabbar .wrap{overflow-x:auto;padding:0 4px;scrollbar-width:none;-ms-overflow-style:none;flex-wrap:nowrap}
  .tabbar .wrap::-webkit-scrollbar{display:none}
  .tab{padding:13px 14px;font-size:12px;gap:6px}
  .tab.active::after{left:14px;right:14px}
  .tab .tnum{font-size:10px}
  .macros{flex-direction:column;align-items:flex-start;gap:10px;padding:14px 16px}
  .macros .sep{display:none}
  .macros .kcal{font-size:26px}
  .evalwrap,.specs,.vinag-grid{grid-template-columns:1fr}
  .foot-inner{flex-direction:column;align-items:flex-start;gap:6px}
}
@media(max-width:400px){
  h1{font-size:clamp(32px,10vw,56px)}
  .tab{padding:12px 10px;font-size:11px}
}
</style>
</head>

function buildMeal(meal) {
  const groups = meal.grupos.map((g,gi) => {
    const opts = g.ops.map((op,oi) => {
      const key = `${meal.id}-${gi}-${oi}`;
      const cnt = (mealState[key]||0);
      const sel = cnt > 0;
      return `<div class="opt${sel?' selected':''}" data-key="${key}" data-max="${g.max}" data-gi="${gi}" data-mid="${meal.id}" onclick="toggleOpt(this)">
        <div class="cb">${sel?'✓':''}</div>
        <span class="opt-text">${op}</span>
        ${g.max>1?`<div class="opt-ctrl">
          <button class="opt-btn" onclick="event.stopPropagation();adjOpt(this,-1)" ${cnt<1?'disabled':''}>−</button>
          <span class="opt-cnt">${cnt||0}</span>
          <button class="opt-btn" onclick="event.stopPropagation();adjOpt(this,1)">+</button>
        </div>`:''}
      </div>`;
    }).join('');
    return `<div class="pick"><div class="k">${g.label}</div><div class="options">${opts}</div></div>`;
  }).join('');
  const nota = meal.nota ? `<div class="note2">${meal.nota}</div>` : '';
  return `<div class="meal"><div class="top">
    <span class="nm">${meal.nombre}</span>
    <span class="mac"><b>${meal.kcal}</b> kcal · ${meal.p}P / ${meal.c}C / ${meal.g}G</span>
  </div><div class="body">${groups}${nota}</div></div>`;
}

function toggleOpt(el) {
  if (!el.dataset.key) return;
  const key = el.dataset.key;
  const cur = mealState[key]||0;
  mealState[key] = cur>0 ? 0 : 1;
  saveMealState(mealState);
  renderNutr();
}

function adjOpt(btn, delta) {
  const opt = btn.closest('.opt');
  const key = opt.dataset.key;
  const cur = mealState[key]||0;
  mealState[key] = Math.max(0, cur+delta);
  saveMealState(mealState);
  renderNutr();
}

          <div class="form-field"><label>Cadera (cm)</label><input type="number" step="0.1" id="f-cadera"></div>
          <div class="form-field"><label>Muslo medio</label><input type="number" step="0.1" id="f-muslo"></div>
          <div class="form-field"><label>Pantorrilla per.</label><input type="number" step="0.1" id="f-pantPer"></div>
        </div>
        <button class="btn-add" onclick="addAntroEntry()">+ Guardar medición</button>
      </div>
    </section>
  </div>`;
  drawAntroCharts();
}

function drawAntroCharts() {
  const data=getAntroData(); const lbl=data.map(d=>d.fecha);
  const first=data[0],last=data[data.length-1];
  const kpis=[
    {v:last.peso,u:'kg',l:'Peso actual',d:+(last.peso-first.peso).toFixed(1),good:'down'},
    {v:last.s8,u:'mm',l:'Σ8 pliegues',d:+(last.s8-first.s8).toFixed(1),good:'down'},
    {v:last.abdom,u:'cm',l:'Cintura',d:+(last.abdom-first.abdom).toFixed(1),good:'down'},
    {v:last.brazFlex,u:'cm',l:'Brazo flex.',d:+(last.brazFlex-first.brazFlex).toFixed(1),good:'up'},
  ];
  $('antroKpis').innerHTML=kpis.map(k=>{
    const sign=k.d>0?'+':''; const cls=(k.good==='down'?k.d<0:k.d>0)?'up':(k.d<0?'down':'');
    const arr=k.d>0?'▲':(k.d<0?'▼':'—');
    return `<div class="kpi"><div class="kv">${k.v}<span style="font-size:14px;opacity:.5"> ${k.u}</span></div><div class="kl">${k.l}</div>${data.length>1?`<div class="kd ${cls}">${arr} ${sign}${k.d} ${k.u}</div>`:''}</div>`;
  }).join('');
  mkChart('cPeso',lbl,[{label:'Peso kg',data:data.map(d=>d.peso),borderColor:CC.gold,pointBackgroundColor:CC.gold}]);
  mkChart('cSigma',lbl,[{label:'Σ6',data:data.map(d=>d.s6),borderColor:CC.coral,pointBackgroundColor:CC.coral},{label:'Σ8',data:data.map(d=>d.s8),borderColor:CC.purple,pointBackgroundColor:CC.purple}]);
  mkChart('cMusc',lbl,[{label:'Brazo flex',data:data.map(d=>d.brazFlex),borderColor:CC.green,pointBackgroundColor:CC.green},{label:'Muslo',data:data.map(d=>d.muslo),borderColor:CC.cyan,pointBackgroundColor:CC.cyan},{label:'Pantorrilla',data:data.map(d=>d.pantPer),borderColor:CC.gold,pointBackgroundColor:CC.gold}]);
  mkChart('cCint',lbl,[{label:'Cintura',data:data.map(d=>d.abdom),borderColor:CC.coral,pointBackgroundColor:CC.coral},{label:'Cadera',data:data.map(d=>d.cadera),borderColor:CC.gold,pointBackgroundColor:CC.gold}]);
  mkChart('cPl',lbl,[{label:'Abdominal',data:data.map(d=>d.abd),borderColor:CC.coral,pointBackgroundColor:CC.coral},{label:'Cresta',data:data.map(d=>d.cresta),borderColor:CC.gold,pointBackgroundColor:CC.gold},{label:'Subescapular',data:data.map(d=>d.sub),borderColor:CC.cyan,pointBackgroundColor:CC.cyan}]);
  const cols=['fecha','peso','s6','s8','brazFlex','muslo','abdom','cadera'];
  const heads=['Fecha','Peso kg','Σ6 mm','Σ8 mm','Brazo cm','Muslo cm','Cintura cm','Cadera cm'];
  $('antroTable').innerHTML=`<thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`+[...data].reverse().map(d=>`<tr>${cols.map(c=>`<td>${d[c]??'—'}</td>`).join('')}</tr>`).join('')+'</tbody>';
}

function addAntroEntry() {
  const gf=id=>{const e=$(id);return e?e.value||null:null};
  const gn=id=>{const e=$(id);return e?parseFloat(e.value)||null:null};
  const fecha=gf('f-fecha'); if(!fecha){alert('Ingresa la fecha');return;}
  const e={fecha:fecha.split('-').reverse().join('.'),peso:gn('f-peso'),tri:gn('f-tri'),bi:gn('f-bi'),sub:gn('f-sub'),cresta:gn('f-cresta'),supra:gn('f-supra'),abd:gn('f-abd'),pierna:gn('f-pierna'),pant:gn('f-pant'),brazRelaj:gn('f-brazRelaj'),brazFlex:gn('f-brazFlex'),abdom:gn('f-abdom'),cadera:gn('f-cadera'),muslo:gn('f-muslo'),pantPer:gn('f-pantPer')};
  e.s6=+[e.tri,e.sub,e.supra,e.abd,e.pierna,e.pant].filter(Boolean).reduce((a,b)=>a+b,0).toFixed(1);
  e.s8=+(e.s6+(e.bi||0)+(e.cresta||0)).toFixed(1);
  const data=getAntroData(); data.push(e); saveAntroData(data);
  antroInited=false; initAntro();
  ['fecha','peso','tri','bi','sub','cresta','supra','abd','pierna','pant','brazRelaj','brazFlex','abdom','cadera','muslo','pantPer'].forEach(f=>{const el=$('f-'+f);if(el)el.value='';});
  flashSave();
}

// ── Entrenamiento ──────────────────────────────────────────────────────────
const TRAIN_KEY = () => `${PATIENT.slug}-train-v1`;
function getTrainLog() { try { return JSON.parse(localStorage.getItem(TRAIN_KEY())||'{}'); } catch { return {}; } }
function saveTrainLog(d) { localStorage.setItem(TRAIN_KEY(), JSON.stringify(d)); }

// Ejercicios base por sesión (nombre, series, reps, descanso)
// RIR cambia entre fase A (micros 1-2) y fase B (micros 3-5)
function makeSesiones(fase) {
  const A = fase === 'A';
  return [
    { id:'s1', nombre:'Sesión 1', tipo:'Lower 1', ejercicios:[
      { n:'Hack squat',                                  s:2, r:'6',  rir: A?2:1,    desc:"7.5'" },
      { n:'Hip thrust',                                  s:2, r:'8',  rir: A?1:null, desc:"5'"   },
      { n:'Flexión de rodilla en máquina sentado',       s:2, r:'10', rir: A?1:null, desc:"5'"   },
      { n:'Búlgaras',                                    s:2, r:'8',  rir: A?1:null, desc:"5'"   },
      { n:'Leg raises en banco declinado',               s:2, r:'10', rir:null,      desc:"2.5'" },
      { n:'Pantorrilla en máquina o multipower',         s:2, r:'10', rir:null,      desc:"2.5'" },
    ]},
    { id:'s2', nombre:'Sesión 2', tipo:'Upper 1', ejercicios:[
      { n:'Barras con lastre con agarre prono',          s:2, r:'6',  rir: A?2:null, desc:"6'"   },
      { n:'Máquina de pectoral convergente',             s:2, r:'6',  rir: A?2:null, desc:"6'"   },
      { n:'Remo con barra tipo Pendlay',                 s:2, r:'6',  rir: A?2:null, desc:"5'"   },
      { n:'Aducción de pecho en máquina',                s:2, r:'10', rir: A?1:null, desc:"5'"   },
      { n:'Jalón unilateral desde polea alta',           s:2, r:'10', rir: A?1:null, desc:"4'"   },
      { n:'Kaz press',                                   s:3, r:'10', rir: A?1:null, desc:"5'"   },
      { n:'Curl de bícep con mancuernas sentado',        s:3, r:'10', rir: A?1:null, desc:"5'"   },
    ]},
    { id:'s3', nombre:'Sesión 3', tipo:'Full Body', ejercicios:[
      { n:'Hack squat',                                  s:2, r:'5',  rir: A?2:1,    desc:"9'"   },
      { n:'RDL',                                         s:2, r:'5',  rir: A?2:1,    desc:"9'"   },
      { n:'Remo unilateral con polea',                   s:2, r:'10', rir: A?1:null, desc:"5'"   },
      { n:'Press con barra a 45°',                       s:2, r:'5',  rir: A?2:1,    desc:"9'"   },
      { n:'Pantorrilla en multipower',                   s:3, r:'10', rir:null,      desc:"5'"   },
      { n:'Deltoide posterior con mancuernas',           s:3, r:'15', rir:null,      desc:"2.5'" },
      { n:'Elevaciones lateral con mancuernas',          s:3, r:'10', rir:null,      desc:"4'"   },
      { n:'Curl de antebrazos con barra, apoyo en banco',s:3, r:'10', rir:null,      desc:"5'"   },
    ]},
    { id:'s4', nombre:'Sesión 4', tipo:'Brazo', ejercicios:[
      { n:'Extensión de trícep desde polea alta agarre prono', s:2, r:'5',  rir: A?1:null, desc:"9'"   },
      { n:'Curl de bícep en banco Scott',                      s:2, r:'5',  rir: A?1:null, desc:"9'"   },
      { n:'Extensión de trícep katana a una mano',             s:2, r:'5',  rir: A?1:null, desc:"9'"   },
      { n:'Curl de bícep Bayesian a una mano',                 s:2, r:'10', rir: A?1:null, desc:"2.5'" },
      { n:'Rotación de tronco desde polea alta (cadera 90°)',  s:2, r:'10', rir: A?1:null, desc:"2.5'" },
      { n:'Tibiales con mancuerna en banco',                   s:2, r:'10', rir:null,      desc:"4'"   },
      { n:'Reverse curl en banco Scott con barra',             s:4, r:'10', rir:null,      desc:"5'"   },
    ]},
  ];
}

const TRAINING = {
  micros: [
    { nombre:'Microciclo 1', fase:'A', sesiones: makeSesiones('A') },
    { nombre:'Microciclo 2', fase:'A', sesiones: makeSesiones('A') },
    { nombre:'Microciclo 3', fase:'B', sesiones: makeSesiones('B') },
    { nombre:'Microciclo 4', fase:'B', sesiones: makeSesiones('B') },
    { nombre:'Microciclo 5', fase:'B', sesiones: makeSesiones('B') },
  ],
};

let trainInited = false;
let activeMicro = 0;

function initTrain() { if(trainInited)return; trainInited=true; renderTrain(); }

function renderTrain() {
  const el = $('tab-entrenamiento'); if(!el) return;
  const micro = TRAINING.micros[activeMicro];
  const microBtns = TRAINING.micros.map((m,i) =>
    `<button class="micro-btn${i===activeMicro?' active':''}" onclick="selectMicro(${i})">${m.nombre}</button>`
  ).join('');

  const sessionsHtml = micro.sesiones.map((ses,si) => {
    const log = getTrainLog();
    const rows = ses.ejercicios.map((ex,ei) => {
      const sets = Array.from({length:ex.s}, (_,k) => {
        const key = `m${activeMicro}_${ses.id}_e${ei}_s${k}`;
        const val = log[key]||'';
        return `<td><input class="log-input" type="text" placeholder="—" value="${val}" oninput="saveLog('m${activeMicro}_${ses.id}_e${ei}_s${k}',this.value)" data-lk="m${activeMicro}_${ses.id}_e${ei}_s${k}"></td>`;
      });
      // Fill up to 4 columns
      while(sets.length < 4) sets.push('<td style="color:var(--faint);font-family:\'IBM Plex Mono\';font-size:11px">—</td>');
      const rirCell = ex.rir !== null && ex.rir !== undefined
        ? `<td class="rir">RIR ${ex.rir}</td>`
        : `<td style="color:var(--faint)">—</td>`;
      return `<tr>
        <td>${ex.n}</td>
        <td class="mono">${ex.s}</td>
        <td class="mono">${ex.r}</td>
        ${rirCell}
        <td class="mono">${ex.desc}</td>
        ${sets.join('')}
      </tr>`;
    }).join('');
    return `<div class="session-block open" id="sb-${si}">
      <div class="session-head" onclick="toggleSession('sb-${si}')">
        <span class="sname">${ses.nombre}</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="stag">${ses.tipo}</span>
          <span class="sarrow">▼</span>
        </div>
      </div>
      <div class="session-body">
        <table class="train-table">
          <thead><tr>
            <th>Ejercicio</th><th>Series</th><th>Reps</th><th>RIR</th><th>Desc.</th>
            <th>Serie 1</th><th>Serie 2</th><th>Serie 3</th><th>Serie 4</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="wrap"><section style="padding-top:24px">
    <div class="sec-h"><span class="ix">01</span><h2>Plan de Entrenamiento · Mesociclo</h2><div class="rule"></div></div>
    <div class="note" style="margin-top:0;margin-bottom:20px"><b>Formato de registro:</b> peso × reps &nbsp;·&nbsp; ej. <span style="font-family:'IBM Plex Mono';color:var(--navy)">60×6</span> &nbsp;·&nbsp; RIR = repeticiones en reserva (cuántas te quedan al terminar la serie)</div>
    <div class="train-selector">${microBtns}</div>
    ${sessionsHtml}
  </section></div>`;
}

function selectMicro(idx) {
  activeMicro = idx;
  renderTrain();
}

function toggleSession(id) {
  const block = document.getElementById(id);
  if(block) block.classList.toggle('open');
}

function saveLog(key, val) {
  const log = getTrainLog();
  if(val) log[key] = val; else delete log[key];
  saveTrainLog(log);
  flashSave();
}

// ── Utils ──────────────────────────────────────────────────────────────────
function flashSave() {
  clearTimeout(saveTimer);
  const el=$('saveind'); el.classList.add('show'); $('saveTxt').textContent='Guardado';
  saveTimer=setTimeout(()=>el.classList.remove('show'),1800);
}

function init() {
  renderHero();
  renderTabs();
  renderNutr();
  renderEval();
  renderSpecs();
}

init();
</script>
