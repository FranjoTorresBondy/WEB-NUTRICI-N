function drawAntroCharts(){var data=getAntroData();var lbl=data.map(function(d){return d.fecha;});var last=data[data.length-1];$('antroKpis').innerHTML=[{v:last.peso,u:'kg',l:'Peso actual'},{v:last.s8,u:'mm',l:'Sigma 8'},{v:last.abdom,u:'cm',l:'Cintura'},{v:last.cadera,u:'cm',l:'Cadera'}].map(function(k){return '<div class="kpi"><div class="kv">'+k.v+'<span style="font-size:14px;opacity:.5"> '+k.u+'</span></div><div class="kl">'+k.l+'</div></div>';}).join('');mkChart('cPeso',lbl,[{label:'Peso kg',data:data.map(function(d){return d.peso;}),borderColor:CC.gold,pointBackgroundColor:CC.gold}]);mkChart('cSigma',lbl,[{label:'Sigma 6',data:data.map(function(d){return d.s6;}),borderColor:CC.coral,pointBackgroundColor:CC.coral},{label:'Sigma 8',data:data.map(function(d){return d.s8;}),borderColor:CC.purple,pointBackgroundColor:CC.purple}]);mkChart('cMusc',lbl,[{label:'Brazo flex',data:data.map(function(d){return d.brazFlex;}),borderColor:CC.green,pointBackgroundColor:CC.green},{label:'Muslo',data:data.map(function(d){return d.muslo;}),borderColor:CC.cyan,pointBackgroundColor:CC.cyan},{label:'Pantorrilla',data:data.map(function(d){return d.pantPer;}),borderColor:CC.gold,pointBackgroundColor:CC.gold}]);mkChart('cCint',lbl,[{label:'Cintura',data:data.map(function(d){return d.abdom;}),borderColor:CC.coral,pointBackgroundColor:CC.coral},{label:'Cadera',data:data.map(function(d){return d.cadera;}),borderColor:CC.gold,pointBackgroundColor:CC.gold}]);mkChart('cPl',lbl,[{label:'Abdominal',data:data.map(function(d){return d.abd;}),borderColor:CC.coral,pointBackgroundColor:CC.coral},{label:'Cresta',data:data.map(function(d){return d.cresta;}),borderColor:CC.gold,pointBackgroundColor:CC.gold},{label:'Subescapular',data:data.map(function(d){return d.sub;}),borderColor:CC.cyan,pointBackgroundColor:CC.cyan}]);var cols=['fecha','peso','s6','s8','brazFlex','muslo','abdom','cadera'];var heads=['Fecha','Peso kg','Sigma6','Sigma8','Brazo cm','Muslo cm','Cintura cm','Cadera cm'];$('antroTable'). function addAntroEntry(){function gf(id){var e=$(id);return e?e.value||null:null;}function gn(id){var e=$(id);return e?parseFloat(e.value)||null:null;}var fecha=gf('f-fecha');if(!fecha){alert('Ingresa la fecha');return;}var e={fecha:fecha.split('-').reverse().join('.'),peso:gn('f-peso'),tri:gn('f-tri'),bi:gn('f-bi'),sub:gn('f-sub'),cresta:gn('f-cresta'),supra:gn('f-supra'),abd:gn('f-abd'),pierna:gn('f-pierna'),pant:gn('f-pant'),brazRelaj:gn('f-brazRelaj'),brazFlex:gn('f-brazFlex'),abdom:gn('f-abdom'),cadera:gn('f-cadera'),muslo:gn('f-muslo'),pantPer:gn('f-pantPer')};var vals=[e.tri,e.sub,e.supra,e.abd,e.pierna,e.pant].filter(function(x){return x!=null;});e.s6=vals.length===6?+vals.reduce(function(a,b){return a+b;},0).toFixed(1):null;e.s8=e.s6!=null&&e.bi!=null&&e.cresta!=null?+(e.s6+e.bi+e.cresta).toFixed(1):null;var data=getAntroData();data.push(e);saveAntroData(data);antroInited=false;initAntro();['fecha','peso','tri','bi','sub','cresta','supra','abd','pierna','pant','brazRelaj','brazFlex','abdom','cadera','muslo','pantPer'].forEach(function(f){var el=$('f-'+f);if(el)el.value='';});flashSave();}
function flashSave(){clearTimeout(saveTimer);var el=$('saveind');el.classList.add('show');$('saveTxt').textContent='Guardado';saveTimer=setTimeout(function(){el.classList.remove('show');},1800);}
var WEIGHT_KEY=PATIENT.slug+'-weight-v1';var PHOTOS_KEY=PATIENT.slug+'-photos-v1';var seguimientoInited=false;
function getWeightData(){try{var r=localStorage.getItem(WEIGHT_KEY);return r?JSON.parse(r):[];}catch(e){return[];}}
function saveWeightData(d){localStorage.setItem(WEIGHT_KEY,JSON.stringify(d));}
function getPhotosData(){try{var r=localStorage.getItem(PHOTOS_KEY);return r?JSON.parse(r):[];}catch(e){return[];}}
function savePhotosData(d){localStorage.setItem(PHOTOS_KEY,JSON.stringify(d));}
function initSeguimiento(){if(seguimientoInited)return;seguimientoInited=true;renderSeguimiento();}
function renderSeguimiento(){var el=$('tab-seguimiento');if(!el)return;el.innerHTML='<div class="wrap"><section style="padding-top:24px"><div class="sec-h"><span class="ix">01</span><h2>Registro diario de peso</h2><div class="rule"></div></div><div class="weight-form"><div class="wf-field"><label>Fecha</label><input type="date" id="w-fecha"></div><div class="wf-field"><label>Peso (kg)</label><input type="number" step="0.1" id="w-peso" placeholder="60.4" style="width:120px"></div><button class="btn-add" onclick="addWeight()" style="margin-top:0;align-self:flex-end">+ Agregar</button></div><div class="chart-card"><h3>Tendencia de peso</h3><div class="cap" id="weightCap">—</div><div class="chart-wrap" style="height:260px"><canvas id="cWeight"></canvas></div></div><div class="tbl-scroll" style="margin-top:16px"><table class="weight-table" id="weightTable"></table></div></section><section style="padding-top:0"><div class="sec-h"><span class="ix">02</span><h2>Fotos de progreso</h2><div class="rule"></div></div><div class="photo-upload-area" id="photoDropZone" onclick="$(\'photoInput\').click()" ondragover="event.preventDefault();this.classList.add(\'drag\')" ondragleave="this.classList.remove(\'drag\')" ondrop="handlePhotoDrop(event)"><div class="pu-icon">📷</div><div class="pu-label">Subir foto de progreso</div><div class="pu-sub">Haz clic o arrastra una imagen · JPG, PNG · se comprime automáticamente</div></div><input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handlePhotoFiles(this.files)"><div id="storageInfo"></div><div class="photo-grid" id="photoGrid"></div></section></div>';var today=new Date();var pad=function(n){return n<10?'0'+n:n;};$('w-fecha').value=today.getFullYear()+'-'+pad(today.getMonth()+1)+'-'+pad(today.getDate());drawWeightChart();drawPhotoGrid();}
function linReg(pts){var n=pts.length;if(n<2)return null;var sx=0,sy=0,sxy=0,sx2=0;pts.forEach(function(p,i){sx+=i;sy+=p;sxy+=i*p;sx2+=i*i;});var slope=(n*sxy-sx*sy)/(n*sx2-sx*sx);return{slope:slope,intercept:(sy-slope*sx)/n};}
function movingAvg(data,w){return data.map(function(d,i){var sl=data.slice(Math.max(0,i-w+1),i+1);return +(sl.reduce(function(a,b){return a+b;},0)/sl.length).toFixed(2);});}
function drawWeightChart(){var data=getWeightData();data.sort(function(a,b){return a.fecha.localeCompare(b.fecha);});var labels=data.map(function(d){return d.fecha.split('-').reverse().join('.');});var weights=data.map(function(d){return d.peso;});var ctx=$('cWeight');if(!ctx)return;if(ctx._ch)ctx._ch.destroy();var ds=[{label:'Peso kg',data:weights,borderColor:CC.gold,pointBackgroundColor:CC.gold,pointRadius:4,borderWidth:2,tension:.3,fill:false,spanGaps:true}];if(weights.length>=3){var r=linReg(weights);ds.push({label:'Tendencia',data:weights.map(function(d,i){return +(r.intercept+r.slope*i).toFixed(2);}),borderColor:'rgba(196,151,58,.4)',borderDash:[6,4],pointRadius:0,borderWidth:2,tension:0,fill:false});}if(weights.length>=7){ds.push({label:'Media 7d',data:movingAvg(weights,7),borderColor:CC.cyan,pointRadius:0,borderWidth:1.5,tension:.4,fill:false});}ctx._ch=new Chart(ctx,{type:'line',data:{labels:labels,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:12,padding:14,color:'#888'}},tooltip:{mode:'index',intersect:false}},scales:{x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#666',maxTicksLimit:12}},y:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#666'},suggestedMin:weights.length?Math.min.apply(null,weights)-1:58,suggestedMax:weights.length?Math.max.apply(null,weights)+1:63}}}});var cap=$('weightCap');if(cap){if(!weights.length){cap.textContent='Sin registros aún';}else if(weights.length===1){cap.textContent=weights[0]+' kg';}else{var diff=+(weights[weights.length-1]-weights[0]).toFixed(1);var rg=linReg(weights);cap.textContent=data.length+' registros · '+(diff>0?'+':'')+diff+' kg total · '+(rg.slope*7>0?'+':'')+(+(rg.slope*7).toFixed(2))+' kg/semana';}}drawWeightTable(data);}
function drawWeightTable(data){var tbl=$('weightTable');if(!tbl)return;var s=[].concat(data).reverse();if(!s.length){tbl.innerHTML='<tr><td style="color:var(--faint);padding:16px;font-size:13px">Sin registros todavía.</td></tr>';return;}tbl.innerHTML='<thead><tr><th style="text-align:left">Fecha</th><th>Peso</th><th>Cambio</th><th></th></tr></thead><tbody>'+s.map(function(d,i){var prev=s[i+1];var diff=prev?+(d.peso-prev.peso).toFixed(1):null;var dc=diff!=null?('<span class="'+(diff>0?'pos':'neg')+'">'+(diff>0?'+':'')+diff+'</span>'):'—';return '<tr><td>'+d.fecha.split('-').reverse().join('.')+'</td><td>'+d.peso+' kg</td><td>'+dc+'</td><td><button class="del-btn" onclick="deleteWeight(\''+d.fecha+'\')">✕</button></td></tr>';}).join('')+'</tbody>';}
function addWeight(){var fecha=$('w-fecha')&&$('w-fecha').value;var peso=parseFloat($('w-peso')&&$('w-peso').value);if(!fecha||isNaN(peso)){alert('Completa fecha y peso');return;}var data=getWeightData();var idx=data.findIndex(function(d){return d.fecha===fecha;});if(idx>=0){data[idx].peso=peso;}else{data.push({fecha:fecha,peso:peso});}saveWeightData(data);drawWeightChart();flashSave();}
function deleteWeight(fecha){saveWeightData(getWeightData().filter(function(d){return d.fecha!==fecha;}));drawWeightChart();flashSave();}
function compressImage(file,cb){var reader=new FileReader();reader.onload=function(e){var img=new Image();img.onload=function(){var MAX=900,w=img.width,h=img.height;if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.72));};img.src=e.target.result;};reader.readAsDataURL(file);}
function handlePhotoFiles(files){Array.from(files).forEach(function(file){compressImage(file,function(src){var today=new Date();var photos=getPhotosData();photos.unshift({id:Date.now()+'_'+Math.random().toString(36).slice(2),src:src,fecha:today.getDate()+'.'+(today.getMonth()+1)+'.'+today.getFullYear()});try{savePhotosData(photos);}catch(e){alert('Almacenamiento lleno.');return;}drawPhotoGrid();flashSave();});});var pi=$('photoInput');if(pi)pi.value='';}
function handlePhotoDrop(e){e.preventDefault();var dz=$('photoDropZone');if(dz)dz.classList.remove('drag');handlePhotoFiles(e.dataTransfer.files);}
function deletePhoto(id){savePhotosData(getPhotosData().filter(function(p){return p.id!==id;}));drawPhotoGrid();flashSave();}
function openLightbox(src){var lb=document.createElement('div');lb.className='photo-lightbox';lb.innerHTML='<img src="'+src+'">';lb.onclick=function(){document.body.removeChild(lb);};document.body.appendChild(lb);}
function drawPhotoGrid(){var grid=$('photoGrid');if(!grid)return;var photos=getPhotosData();updateStorageInfo();if(!photos.length){grid.innerHTML='<div style="color:var(--faint);font-size:13px;padding:16px 0">Aún no hay fotos.</div>';return;}grid.innerHTML=photos.map(function(p){return '<div class="photo-item"><img src="'+p.src+'" loading="lazy" style="cursor:zoom-in" onclick="openLightbox(\''+p.src+'\')"><div class="pi-foot"><span class="pi-date">'+p.fecha+'</span><button class="pi-del" onclick="deletePhoto(\''+p.id+'\')">✕</button></div></div>';}).join('');}
function updateStorageInfo(){var info=$('storageInfo');if(!info)return;try{var used=0;[WEIGHT_KEY,PHOTOS_KEY,ANTRO_KEY,MEAL_KEY].forEach(function(k){var v=localStorage.getItem(k);if(v)used+=v.length*2;});var pct=Math.min(100,Math.round(used/5e6*100));info.innerHTML='<div class="storage-bar"><div class="storage-bar-fill" style="width:'+pct+'%"></div></div><div class="storage-label">Almacenamiento: '+(used/1e6).toFixed(2)+' MB de ~5 MB · '+pct+'%</div>';}catch(e){}}

init();
