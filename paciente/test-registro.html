<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST — Registro Diario</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Franklin:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Chakra+Petch:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="paciente.css">
<style>
:root{
  --bg:#080808;--bg2:#111;--panel:#141414;--panel2:#1c1c1c;
  --line:#2a2a2a;--ink:#f0f0f0;--muted:#888;--faint:#555;
  --navy:#C4973A;--amber:#C4973A;
  --shadow:0 1px 4px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.55;padding:40px 20px}
.wrap{max-width:900px;margin:0 auto}
h1{font-family:'Chakra Petch',sans-serif;font-size:32px;color:#fff;margin-bottom:6px}
.badge{display:inline-block;background:#1a3a1a;color:#4caf50;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;margin-bottom:28px;letter-spacing:.05em}
.meals{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:760px){.meals{grid-template-columns:1fr}}
.meal{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.meal .top{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line);background:var(--panel2)}
.meal .top .nm{font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:17px}
.meal .top .mac{font-family:'IBM Plex Mono';font-size:11px;color:var(--muted)}
.meal .top .mac b{color:var(--amber)}
.meal .body{padding:14px 20px 18px}
.pick .k{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--navy);font-weight:600;margin-bottom:8px}
.opt{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:9px;cursor:pointer;border:1.5px solid transparent;font-size:12.5px;color:var(--muted);user-select:none;transition:.15s}
.opt:hover{background:rgba(196,151,58,.05)}
.opt.selected{background:rgba(196,151,58,.1);border-color:rgba(196,151,58,.3);color:var(--ink)}
.cb{width:18px;height:18px;border:2px solid var(--line);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.opt.selected .cb{background:var(--navy);border-color:var(--navy);color:#000}
</style>
</head>
<body>
<div class="wrap">
  <h1>🧪 Página de prueba</h1>
  <div class="badge">SOLO PARA TESTING — no es un paciente real</div>

  <div class="meals" id="meals-container"></div>
  <div id="toast-container" style="position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px"></div>
</div>

<script>
const PATIENT = {
  slug: 'test-registro',
  nombre: 'Test Registro'
};

const MEAL_KEY = () => `test-registro-meals-v1`;
function getMealState() { try { return JSON.parse(localStorage.getItem(MEAL_KEY())||'{}'); } catch { return {}; } }
function saveMealState(s) { localStorage.setItem(MEAL_KEY(), JSON.stringify(s)); }
let mealState = getMealState();

const comidas = [
  { id:'des', nombre:'☀️ Desayuno', kcal:500, p:30, c:60, g:15, grupos:[
    { label:'Escoge 01 · Carbohidrato', max:1, ops:['1 taza de avena con leche','2 tostadas integrales con palta','1 yogur griego con granola'] },
    { label:'Escoge 01 · Proteína', max:1, ops:['3 huevos revueltos','1 scoop de proteína','100g de quesillo'] },
  ]},
  { id:'alm', nombre:'🥗 Almuerzo', kcal:650, p:45, c:70, g:18, grupos:[
    { label:'Escoge 01 · Carbohidrato', max:1, ops:['60g de arroz','1 papa mediana','50g de fideos'] },
    { label:'Escoge 01 · Proteína (200g)', max:1, ops:['Pechuga de pollo','Filete de pescado','Carne molida magra'] },
    { label:'Escoge 01 · Verduras', max:1, ops:['Ensalada mixta','Verduras salteadas','Brócoli al vapor'] },
  ]},
];

function buildMeal(meal) {
  const groups = meal.grupos.map((g,gi) => {
    const opts = g.ops.map((op,oi) => {
      const key = `${meal.id}-${gi}-${oi}`;
      const sel = (mealState[key]||0) > 0;
      return `<div class="opt${sel?' selected':''}" data-key="${key}" data-gi="${gi}" data-mid="${meal.id}" onclick="toggleOpt(this)">
        <div class="cb">${sel?'✓':''}</div>
        <span>${op}</span>
      </div>`;
    }).join('');
    return `<div class="pick" style="margin-bottom:12px"><div class="k">${g.label}</div>${opts}</div>`;
  }).join('');
  return `<div class="meal" data-mealid="${meal.id}">
    <div class="top">
      <span class="nm">${meal.nombre}</span>
      <span class="mac"><b>${meal.kcal}</b> kcal · ${meal.p}P/${meal.c}C/${meal.g}G</span>
    </div>
    <div class="body">${groups}</div>
  </div>`;
}

function toggleOpt(el) {
  const key = el.dataset.key;
  mealState[key] = (mealState[key]||0) > 0 ? 0 : 1;
  saveMealState(mealState);
  render();
}

function render() {
  document.getElementById('meals-container').innerHTML = comidas.map(buildMeal).join('');
  if (typeof injectMealLog === 'function') {
    document.querySelectorAll('.meal[data-mealid]').forEach(injectMealLog);
    document.querySelectorAll('.meals').forEach(injectGuardarBtn);
  }
}

function showToast(msg, type) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.style.cssText = `background:${type==='success'?'#1a3a1a':'#3a1a1a'};color:${type==='success'?'#4caf50':'#ef5350'};padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid ${type==='success'?'#2e5a2e':'#5a2e2e'}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

render();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="paciente.js"></script>
</body>
</html>
