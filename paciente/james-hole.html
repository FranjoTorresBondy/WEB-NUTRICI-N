// ── helpers ────────────────────────────────────────────────────────────────
function s6(a){
  return a.tri + a.sub + a.supra + a.abd + a.pierna + a.pant;
}
function s8(a){
  return s6(a) + a.bi + a.cresta;
}
function mgKg(a){
  var s4 = a.tri + a.sub + a.supra + a.abd;
  var pct = 5.783 + (0.153 * s4);
  return { pct: Math.round(pct*10)/10, kg: Math.round(a.peso*(pct/100)*10)/10, magra: Math.round(a.peso*(1-pct/100)*10)/10 };
}
function getAntroBase(){
  return [ PATIENT.antro ];
}

// ── build UI ───────────────────────────────────────────────────────────────
var TABS = [
  { id:'plan',   label:'Plan',   icon:'01' },
  { id:'eval',   label:'Evaluación', icon:'02' },
  { id:'spec',   label:'Especificaciones', icon:'03' },
];

(function init(){
  var n = PATIENT.nombre.replace('\n',' ');
  document.title = n + ' — Plan Nutricional';
  document.getElementById('heroEyebrow').textContent = 'Plan nutricional';
  document.getElementById('heroNombre').textContent = PATIENT.nombre.replace('\n','\n');
  document.getElementById('heroSub').innerHTML =
    '<span>Fecha: <b>' + PATIENT.fecha + '</b></span>' +
    '<span>Plan: <b>' + PATIENT.tipoPlan + '</b></span>' +
    '<span>Kcal: <b>' + PATIENT.macros.kcal + ' kcal</b></span>';

  var nav = document.getElementById('tabNav');
  var panels = document.getElementById('tabPanels');
  TABS.forEach(function(t, i){
    var btn = document.createElement('button');
    btn.className = 'tab' + (i===0?' active':'');
    btn.dataset.tab = t.id;
    btn.innerHTML = t.label + '<span class="tnum">' + t.icon + '</span>';
    btn.onclick = function(){ switchTab(t.id); };
    nav.appendChild(btn);

    var div = document.createElement('div');
    div.className = 'panel' + (i===0?' active':'');
    div.id = 'panel-' + t.id;
    div.innerHTML = '<div class="wrap">' + buildPanel(t.id) + '</div>';
    panels.appendChild(div);
  });

  loadSaved();
  document.getElementById('heroNombre').style.whiteSpace = 'pre-line';
})();

function switchTab(id){
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===id); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.toggle('active', p.id==='panel-'+id); });
  if(id==='eval') renderEval();
}

function buildPanel(id){
  if(id==='plan')  return buildPlan();
  if(id==='eval')  return '<div id="evalRoot"></div>';
  if(id==='spec')  return buildSpec();
  return '';
}

// ── PLAN ───────────────────────────────────────────────────────────────────
function buildPlan(){
  var m = PATIENT.macros;
  var h = '<section>';
  h += '<div class="sec-h"><span class="ix">01</span><h2>Plan alimenticio</h2><div class="rule"></div></div>';
  h += '<div class="macros">';
  h += '<div class="kcal">' + m.kcal + ' <small>kcal</small></div>';
  h += '<div class="mtag"><b>' + m.p + '</b> g Proteína</div>';
  h += '<div class="mtag"><b>' + m.c + '</b> g Carbohidrato</div>';
  h += '<div class="mtag"><b>' + m.g + '</b> g Grasa</div>';
  h += '<div class="sep"></div>';
  PATIENT.tipoPlan.split(' · ').forEach(function(t){ h += '<span class="tag">' + t + '</span>'; });
  h += '</div>';
  h += '<div class="note"><b>Días de entrenamiento:</b> agregar el Pre Entreno a las comidas del día de descanso.</div>';
  h += '<div class="meals">';
  PATIENT.comidas.forEach(function(c){
    h += buildMealCard(c);
  });
  h += '</div></section>';
  h += buildHydro();
  return h;
}

function buildMealCard(c){
  var h = '<div class="meal" id="meal-' + c.id + '">';
  h += '<div class="top"><div class="nm">' + c.nombre + '</div>';
  h += '<div class="mac"><b>' + c.kcal + '</b> kcal<br>' + c.p + 'P · ' + c.c + 'C · ' + c.g + 'G</div></div>';
  h += '<div class="body">';
  c.grupos.forEach(function(g, gi){
    h += '<div class="pick" data-meal="' + c.id + '" data-gi="' + gi + '" data-max="' + g.max + '">';
    h += '<div class="k">' + g.label + '</div><div class="options">';
    g.ops.forEach(function(op, oi){
      h += '<div class="opt" onclick="toggleOpt(this,\'' + c.id + '\',' + gi + ',' + oi + ',' + g.max + ')">';
      h += '<div class="cb"></div>';
      h += '<div class="opt-text">' + op + '</div>';
      if(g.max > 1){
        h += '<div class="opt-ctrl">';
        h += '<button class="opt-btn" onclick="adj(event,this,-1)" disabled>−</button>';
        h += '<span class="opt-cnt">0</span>';
        h += '<button class="opt-btn" onclick="adj(event,this,1)">+</button>';
        h += '</div>';
      }
      h += '</div>';
    });
    h += '</div></div>';
  });
  if(c.nota) h += '<div class="note2">' + c.nota + '</div>';
  h += '</div></div>';
  return h;
}

function buildHydro(){
  var h = '<section><div class="sec-h"><span class="ix">02</span><h2>Hidratación</h2><div class="rule"></div></div>';
  h += '<div class="hydro">';
  PATIENT.hidratacion.forEach(function(hc){
    h += '<div class="hcard"><div class="l">' + hc.label + '</div><div class="b">' + hc.valor + ' L</div></div>';
  });
  h += '</div>';
  h += '<p style="font-size:12px;color:var(--faint);margin-top:14px">Este es un esquema que puede variar. Procura beber líquido frecuentemente durante el día y que tus orinas sean siempre claras. Llegar bien hidratado a los entrenamientos.</p>';
  h += '</section>';
  return h;
}

// ── EVAL ───────────────────────────────────────────────────────────────────
function renderEval(){
  var root = document.getElementById('evalRoot');
  if(!root) return;
  var a = PATIENT.antro;
  var ss6 = s6(a), ss8 = s8(a);
  var gm = mgKg(a);

  var h = '<section>';
  h += '<div class="sec-h"><span class="ix">01</span><h2>Evaluación Nutricional</h2><div class="rule"></div></div>';
  h += '<div class="evalwrap">';

  // Datos generales
  h += '<div class="evgroup"><div class="gh">Datos Generales</div>';
  h += row('Fecha', a.fecha);
  h += row('Peso', a.peso + ' kg');
  h += row('Talla', a.talla + ' cm');
  h += row('IMC', a.imc + ' kg/m²');
  h += '</div>';

  // Pliegues
  h += '<div class="evgroup"><div class="gh">Pliegues (mm)</div>';
  h += row('Tricipital', a.tri);
  h += row('Bicipital', a.bi);
  h += row('Subescapular', a.sub);
  h += row('Cresta ilíaca', a.cresta);
  h += row('Supra espinal', a.supra);
  h += row('Abdominal', a.abd);
  h += row('Pierna media', a.pierna);
  h += row('Pantorrilla', a.pant);
  h += rowBold('Σ 6 pliegues', ss6.toFixed(1) + ' mm');
  h += rowBold('Σ 8 pliegues', ss8.toFixed(1) + ' mm');
  h += '</div>';

  // Perímetros
  h += '<div class="evgroup"><div class="gh">Perímetros (cm)</div>';
  h += row('Brazo relajado', a.brazRelaj);
  h += row('Brazo flexionado', a.brazFlex);
  h += row('Abdominal', a.abdom);
  h += row('Cadera', a.cadera);
  h += row('Muslo medio', a.muslo);
  h += row('Pantorrilla', a.pantPer);
  h += '</div>';

  // Diámetros
  h += '<div class="evgroup"><div class="gh">Diámetros (cm)</div>';
  h += row('Húmero', a.diam.humero);
  h += row('Bi-estilóideo', a.diam.biEstiloideo);
  h += row('Fémur', a.diam.femur);
  h += '</div>';

  // % Grasa
  h += '<div class="evgroup"><div class="gh">Composición Corporal — Faulkner</div>';
  h += row('% Grasa', gm.pct + ' %');
  h += row('Masa grasa', gm.kg + ' kg');
  h += rowBold('Masa magra', gm.magra + ' kg');
  h += '</div>';

  h += '</div>';

  // Objetivos
  h += '<section><div class="sec-h"><span class="ix">02</span><h2>Objetivos</h2><div class="rule"></div></div>';
  h += '<div class="card obj"><ul>';
  PATIENT.objetivos.forEach(function(o){ h += '<li>' + o + '</li>'; });
  h += '</ul></div></section>';

  h += '</section>';
  root.innerHTML = h;
}

function row(l, v){
  return '<div class="row"><span>' + l + '</span><span>' + v + '</span></div>';
}
function rowBold(l, v){
  return '<div class="row bold"><span>' + l + '</span><span>' + v + '</span></div>';
}

// ── SPEC ───────────────────────────────────────────────────────────────────
function buildSpec(){
  var h = '<section>';
  h += '<div class="sec-h"><span class="ix">01</span><h2>Especificaciones</h2><div class="rule"></div></div>';
  h += '<div class="specs">';
  PATIENT.specs.forEach(function(s){
    h += '<div class="spec"><h4>' + s.titulo + '</h4><ul>';
    s.items.forEach(function(item){
      if(item.startsWith('##')){
        h += '<li style="list-style:none;padding-left:0"><span class="sub-title">' + item.slice(2) + '</span></li>';
      } else {
        h += '<li>' + item + '</li>';
      }
    });
    h += '</ul></div>';
  });
  h += '</div></section>';
  return h;
}

// ── PERSISTENCE ───────────────────────────────────────────────────────────
var SKEY = PATIENT.slug + '-meals-v1';
var saveTimer;

function toggleOpt(el, mealId, gi, oi, max){
  if(max === 1){
    var pick = el.closest('.pick');
    pick.querySelectorAll('.opt').forEach(function(o){ o.classList.remove('selected'); });
    el.classList.add('selected');
  } else {
    var cnt = el.querySelector('.opt-cnt');
    if(!el.classList.contains('selected')){
      el.classList.add('selected');
      cnt.textContent = '1';
    }
    el.querySelector('.opt-btn:last-child').disabled = false;
    el.querySelector('.opt-btn:first-child').disabled = parseInt(cnt.textContent) <= 1;
  }
  scheduleSave();
}

function adj(e, btn, delta){
  e.stopPropagation();
  var opt = btn.closest('.opt');
  var cnt = opt.querySelector('.opt-cnt');
  var v = parseInt(cnt.textContent) + delta;
  if(v < 1){ opt.classList.remove('selected'); cnt.textContent = '0'; }
  else { cnt.textContent = v; opt.classList.add('selected'); }
  opt.querySelector('.opt-btn:first-child').disabled = v <= 1;
  scheduleSave();
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persistSave, 600);
}

function persistSave(){
  var state = {};
  document.querySelectorAll('.opt.selected').forEach(function(o){
    var pick = o.closest('.pick');
    var meal = pick.dataset.meal;
    var gi   = pick.dataset.gi;
    var oi   = Array.from(pick.querySelectorAll('.opt')).indexOf(o);
    var cnt  = o.querySelector('.opt-cnt') ? parseInt(o.querySelector('.opt-cnt').textContent) : 1;
    if(!state[meal]) state[meal] = {};
    if(!state[meal][gi]) state[meal][gi] = {};
    state[meal][gi][oi] = cnt;
  });
  localStorage.setItem(SKEY, JSON.stringify(state));
  showSave('Guardado');
}

function loadSaved(){
  var raw = localStorage.getItem(SKEY);
  if(!raw) return;
  try {
    var state = JSON.parse(raw);
    Object.keys(state).forEach(function(meal){
      Object.keys(state[meal]).forEach(function(gi){
        Object.keys(state[meal][gi]).forEach(function(oi){
          var cnt = state[meal][gi][oi];
          var pick = document.querySelector('[data-meal="'+meal+'"][data-gi="'+gi+'"]');
          if(!pick) return;
          var opts = pick.querySelectorAll('.opt');
          var opt = opts[parseInt(oi)];
          if(!opt) return;
          opt.classList.add('selected');
          var cntEl = opt.querySelector('.opt-cnt');
          if(cntEl){ cntEl.textContent = cnt; opt.querySelector('.opt-btn:first-child').disabled = cnt <= 1; }
        });
      });
    });
  } catch(e){}
}

function showSave(msg){
  var ind = document.getElementById('saveind');
  document.getElementById('saveTxt').textContent = msg;
  ind.classList.add('show');
  setTimeout(function(){ ind.classList.remove('show'); }, 1800);
}
