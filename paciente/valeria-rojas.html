<style>

body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;background-image:radial-gradient(1100px 520px at 50% -12%,rgba(196,151,58,.06),transparent 62%);background-attachment:fixed}

header.hero{padding:60px 0 22px}

function renderTabs(){var tabs=[{id:'plan',label:'Plan Nutricional'},{id:'eval',label:'Evaluación'},{id:'specs',label:'Especificaciones'},{id:'train',label:'Entrenamiento'},{id:'evol-antro',label:'Evolución Física'},{id:'evol-train',label:'Evolución Entreno'},{id:'seguimiento',label:'Mi Progreso'}];$('tabNav').innerHTML=tabs.map(function(t,i){var ex=t.id==='evol-antro'?';initAntro()':t.id==='seguimiento'?';initSeguimiento()':t.id==='evol-train'?';initEvolTrain()':'';return '<button class="tab'+(i===0?' active':'')+'" onclick="showTab(\''+t.id+'\',this)'+ex+'"><span class="tnum">0'+(i+1)+'</span> '+t.label+'</button>';}).join('');$('tabPanels').innerHTML=tabs.map(function(t,i){return '<div id="tab-'+t.id+'" class="panel'+(i===0?' active':'')+'"></div>';}).join('');}
function showTab(id,btn){document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});var p=$('tab-'+id);if(p)p.classList.add('active');btn.classList.add('active');}
var MEAL_KEY=PATIENT.slug+'-meals-v1';
function getMealState(){try{var r=localStorage.getItem(MEAL_KEY);return r?JSON.parse(r):{};}catch(e){return{};}}
function saveMealState(s){localStorage.setItem(MEAL_KEY,JSON.stringify(s));flashSave();}
var mealState=getMealState();
function renderNutr(){var m=PATIENT.macros;var html='<div class="macros"><span class="kcal">'+m.kcal+'<small> kcal / día</small></span><span class="mtag"><b>'+m.p+'g</b> Proteína</span><span class="mtag"><b>'+m.c+'g</b> Carbohidratos</span><span class="mtag"><b>'+m.g+'g</b> Grasas</span><span class="sep"></span><span class="tag">'+PATIENT.tipoPlan+'</span></div>';var meals=PATIENT.comidas.map(function(meal){return buildMeal(meal);}).join('');var hydro='<section style="padding-top:0"><div class="sec-h"><span class="ix">02</span><h2>Requerimientos hídricos</h2><div class="rule"></div></div><div class="hydro">'+PATIENT.hidratacion.map(function(h){return '<div class="hcard"><div class="l">'+h.label+'</div><div class="b">'+h.valor+' L</div></div>';}).join('')+'</div></section>';$('tab-plan').innerHTML='<div class="wrap"><section><div class="sec-h"><span class="ix">01</span><h2>Plan alimentario diario</h2><div class="rule"></div></div>'+html+'<div class="meals">'+meals+'</div></section>'+hydro+'</div>';}
function buildMeal(meal){var groups=meal.grupos.map(function(g,gi){var opts=g.ops.map(function(op,oi){var key=meal.id+'-'+gi+'-'+oi;var cnt=mealState[key]||0;var sel=cnt>0;var ctrl=g.max>1?'<div class="opt-ctrl"><button class="opt-btn" onclick="event.stopPropagation();adjOpt(this,-1)"'+(cnt<1?' disabled':'')+'>-</button><span class="opt-cnt">'+(cnt||0)+'</span><button class="opt-btn" onclick="event.stopPropagation();adjOpt(this,1)">+</button></div>':'';return '<div class="opt'+(sel?' selected':'')+'" data-key="'+key+'" data-max="'+g.max+'" onclick="toggleOpt(this)"><div class="cb">'+(sel?'✓':'')+'</div><span class="opt-text">'+op+'</span>'+ctrl+'</div>';}).join('');return '<div class="pick"><div class="k">'+g.label+'</div><div class="options">'+opts+'</div></div>';}).join('');var macStr=meal.kcal!=null?('<b>'+meal.kcal+'</b> kcal · '+meal.p+'P / '+meal.c+'C / '+meal.g+'G'):'';var nota=meal.nota?'<div style="font-size:11.5px;color:var(--faint);font-style:italic;margin-bottom:10px;padding:8px 10px;background:var(--bg2);border-radius:8px;">'+meal.nota+'</div>':'';return '<div class="meal" data-mealid="'+meal.id+'"><div class="top"><span class="nm">'+meal.nombre+'</span>'+(macStr?'<span class="mac">'+macStr+'</span>':'')+'</div><div class="body">'+nota+groups+'</div></div>';}

function linReg(pts){var n=pts.length;if(n<2)return null;var sx=0,sy=0,sxy=0,sx2=0;pts.forEach(function(p,i){sx+=i;sy+=p;sxy+=i*p;sx2+=i*i;});var slope=(n*sxy-sx*sy)/(n*sx2-sx*sx);return{slope:slope,intercept:(sy-slope*sx)/n};}

function deletePhoto(id){savePhotosData(getPhotosData().filter(function(p){return p.id!==id;}));drawPhotoGrid();flashSave();}
function openLightbox(src){var lb=document.createElement('div');lb.className='photo-lightbox';lb.innerHTML='<img src="'+src+'">';lb.onclick=function(){document.body.removeChild(lb);};document.body.appendChild(lb);}
function drawPhotoGrid(){var grid=$('photoGrid');if(!grid)return;var photos=getPhotosData();updateStorageInfo();if(!photos.length){grid.innerHTML='<div style="color:var(--faint);font-size:13px;padding:16px 0">Aún no hay fotos.</div>';return;}grid.innerHTML=photos.map(function(p){return '<div class="photo-item"><img src="'+p.src+'" loading="lazy" style="cursor:zoom-in" onclick="openLightbox(\''+p.src+'\')"><div class="pi-foot"><span class="pi-date">'+p.fecha+'</span><button class="pi-del" onclick="deletePhoto(\''+p.id+'\')">✕</button></div></div>';}).join('');}
function updateStorageInfo(){var info=$('storageInfo');if(!info)return;try{var used=0;[WEIGHT_KEY,PHOTOS_KEY,ANTRO_KEY,MEAL_KEY].forEach(function(k){var v=localStorage.getItem(k);if(v)used+=v.length*2;});var pct=Math.min(100,Math.round(used/5e6*100));info.innerHTML='<div class="storage-bar"><div class="storage-bar-fill" style="width:'+pct+'%"></div></div><div class="storage-label">Almacenamiento: '+(used/1e6).toFixed(2)+' MB de ~5 MB · '+pct+'%</div>';}catch(e){}}
const BASE_IMG='https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/';
let WEEKS=[];let currentWeek=1;
let evolTrainInited=false,evolActiveSess='s1',evolActiveEx=0,cTrainChart=null;

function buildWeeks(){var weeks=[];var n=1;PATIENT.entrenamiento.fases.forEach(function(fase,fi){for(var i=0;i<fase.semanas;i++){weeks.push({n:n,label:'S'+n,fase:fi,faseLabel:fase.label,color:fase.color,bg:fase.bg});n++;}});return weeks;}

function renderTrain(){if(!PATIENT.entrenamiento)return;WEEKS=buildWeeks();$('tab-train').innerHTML='<div class="wrap"><section style="padding-top:24px"><div class="sec-h"><span class="ix">01</span><h2>Mesociclo · 4 Semanas</h2><div class="rule"></div></div><p class="train-intro">Mesociclo de 4 semanas enfocado en <b>glúteo e isquiotibiales</b>. 3 sesiones de Lower (sin cuádriceps), 2 sesiones de Upper con core en banco declinado. <b>Anota el peso de cada serie</b> — se guarda automáticamente.</p><div class="weeksel" id="weeksel"></div></section><section style="padding-top:6px"><div class="train-head" id="trainHead"></div><div id="sessions"></div></section></div>';buildWeekSel();buildTrainHead(WEEKS[0]);$('sessions').innerHTML=buildSessions(1);loadTrainValues();}

function buildWeekSel(){$('weeksel').innerHTML=WEEKS.map(function(w){return '<button class="wbtn'+(w.n===1?' active':'')+'" onclick="setWeek('+w.n+',this)"><span class="wdot" style="background:'+w.color+'"></span><span class="wn">'+w.label+'</span><span class="wp" style="color:'+w.color+'">'+w.faseLabel+'</span></button>';}).join('');}

function buildTrainHead(w){$('trainHead').innerHTML='<span class="badge" style="background:'+w.bg+';color:#fff">'+w.label+' · '+w.faseLabel+'</span><span class="hint" style="color:var(--muted)">Progresión de volumen e intensidad semanal</span>';}

function setWeek(n,btn){currentWeek=n;document.querySelectorAll('.wbtn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');var w=WEEKS.find(function(x){return x.n===n;});buildTrainHead(w);$('sessions').innerHTML=buildSessions(n);loadTrainValues();}

function buildThumb(ex){if(ex.img==='anim'){return '<div class="thumb" style="position:relative"><img src="'+BASE_IMG+ex.s1+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .3s" onmouseover="this.style.opacity=0;this.nextElementSibling.style.opacity=1" onmouseout="this.style.opacity=1;this.nextElementSibling.style.opacity=0" loading="lazy"><img src="'+BASE_IMG+ex.s2+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s" loading="lazy"></div>';}return '<div class="thumb"><img src="'+(ex.gif||ex.s1)+'" loading="lazy" style="width:100%;height:100%;object-fit:cover"></div>';}

function rirLabel(rir){if(rir==='F')return{text:'A fallo',cls:'rir-f'};if(rir===0)return{text:'RIR 0',cls:'rir'};return{text:'RIR '+rir,cls:''};}

function buildSessions(week){return PATIENT.entrenamiento.sesiones.map(function(sess,si){var exRows=sess.ejercicios.map(function(ex,ei){var prog=ex.prog[week-1];var series=prog[0],rir=prog[1];var rl=rirLabel(rir);var sets=Array.from({length:series},function(_,si2){var k=trainKey(sess.id,ei,si2);return '<div class="setbox"><div class="sl">Serie '+(si2+1)+'</div><input type="number" inputmode="decimal" placeholder="—" data-key="'+k+'" oninput="saveTrainInput(this)"><div class="un">kg</div></div>';}).join('');var notaHtml=ex.nota?'<span style="font-size:11px;color:var(--faint);display:block;margin-top:3px">'+ex.nota+'</span>':'';return '<div class="exq">'+buildThumb(ex)+'<div class="ebody"><div class="nm">'+ex.nombre+notaHtml+'</div><div class="meta"><span class="mpill"><b>'+series+'×'+ex.reps+'</b></span><span class="mpill '+rl.cls+'"><b>'+rl.text+'</b></span><span class="mpill rest">Descanso <b>'+ex.descanso+'</b></span></div><div class="sets">'+sets+'</div></div></div>';}).join('');return '<div class="sess open"><div class="sh" onclick="this.closest(\'.sess\').classList.toggle(\'open\')"><span class="snum">0'+(si+1)+'</span><span style="font-size:20px">'+sess.icon+'</span><h3>'+sess.label+'</h3><span class="scount">'+sess.ejercicios.length+' ejercicios · '+sess.nota+'</span><span class="chev">›</span></div><div class="sbody">'+exRows+'</div></div>';}).join('');}

function trainKey(sessId,exIdx,setIdx){return PATIENT.slug+'-train-s'+currentWeek+'-'+sessId+'-'+exIdx+'-s'+setIdx;}
function saveTrainInput(input){localStorage.setItem(input.dataset.key,input.value);input.closest('.setbox').classList.toggle('filled',input.value!=='');flashSave();}
function loadTrainValues(){document.querySelectorAll('#sessions input[data-key]').forEach(function(inp){var val=localStorage.getItem(inp.dataset.key)||'';inp.value=val;inp.closest('.setbox').classList.toggle('filled',val!=='');});}

function initEvolTrain(){if(evolTrainInited)return;evolTrainInited=true;renderEvolTrain();}
function renderEvolTrain(){var el=$('tab-evol-train');if(!el)return;el.innerHTML='<div class="wrap"><section style="padding-top:24px"><div class="sec-h"><span class="ix">01</span><h2>Evolución del Entrenamiento</h2><div class="rule"></div></div><p class="train-intro">Los pesos anotados en la pestaña <b>Entrenamiento</b> se grafican aquí automáticamente por semana.</p><div class="sess-sel" id="evolSessSel"></div><div class="ex-sel" id="evolExSel"></div><div class="chart-card" id="evolChartCard"><h3 id="evolChartTitle">—</h3><div class="cap">Peso máximo registrado por semana (kg)</div><div class="chart-wrap"><canvas id="cTrain"></canvas></div></div></section></div>';buildEvolSessSel();buildEvolExSel();renderEvolChart();}
function buildEvolSessSel(){$('evolSessSel').innerHTML=PATIENT.entrenamiento.sesiones.map(function(s){return '<button class="sess-btn'+(s.id===evolActiveSess?' active':'')+'" onclick="setEvolSess(\''+s.id+'\',this)">'+s.icon+' '+s.label+'</button>';}).join('');}
function setEvolSess(id,btn){evolActiveSess=id;evolActiveEx=0;document.querySelectorAll('.sess-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');buildEvolExSel();renderEvolChart();}
function buildEvolExSel(){var sess=PATIENT.entrenamiento.sesiones.find(function(s){return s.id===evolActiveSess;});$('evolExSel').innerHTML=sess.ejercicios.map(function(ex,i){return '<button class="ex-pill'+(i===evolActiveEx?' active':'')+'" onclick="setEvolEx('+i+',this)">'+ex.nombre+'</button>';}).join('');}
function setEvolEx(idx,btn){evolActiveEx=idx;document.querySelectorAll('.ex-pill').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderEvolChart();}
function renderEvolChart(){if(!WEEKS.length)WEEKS=buildWeeks();var sess=PATIENT.entrenamiento.sesiones.find(function(s){return s.id===evolActiveSess;});var ex=sess.ejercicios[evolActiveEx];if($('evolChartTitle'))$('evolChartTitle').textContent=ex.nombre;var byWeek={};for(var i=0;i<localStorage.length;i++){var key=localStorage.key(i);if(!key)continue;var pat=new RegExp('^'+PATIENT.slug+'-train-s(\\d+)-'+sess.id+'-(\\d+)-s(\\d+)$');var m=key.match(pat);if(!m)continue;if(parseInt(m[2])!==evolActiveEx)continue;var val=parseFloat(localStorage.getItem(key));if(!val||isNaN(val))continue;if(!byWeek[m[1]])byWeek[m[1]]=[];byWeek[m[1]].push(val);}var lbl=WEEKS.map(function(w){return w.label;});var maxW=WEEKS.map(function(w){return byWeek[w.n]?Math.max.apply(null,byWeek[w.n]):null;});var hasData=maxW.some(function(v){return v!==null;});if(cTrainChart){cTrainChart.destroy();cTrainChart=null;}var ctx=$('cTrain');if(!ctx)return;var nd=document.querySelector('#evolChartCard .no-data');if(nd)nd.remove();if(!hasData){ctx.style.display='none';var d=document.createElement('div');d.className='no-data';d.textContent='Aún no hay pesos registrados. Anótalos en la pestaña Entrenamiento.';$('evolChartCard').appendChild(d);return;}ctx.style.display='';cTrainChart=new Chart(ctx,{type:'line',data:{labels:lbl,datasets:[{label:'Máximo kg',data:maxW,borderColor:CC.gold,pointBackgroundColor:CC.gold,tension:.35,pointRadius:5,borderWidth:2,fill:false,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:12,padding:14,color:'#888'}}},scales:{x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#666'}},y:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#666'}}}}});}

function init(){renderHero();renderTabs();renderNutr();renderEval();renderSpecs();renderTrain();}
init();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
