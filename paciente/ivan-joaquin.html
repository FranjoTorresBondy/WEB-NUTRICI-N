function linReg(pts){var n=pts.length;if(n<2)return null;var sx=0,sy=0,sxy=0,sx2=0;pts.forEach(function(p,i){sx+=i;sy+=p;sxy+=i*p;sx2+=i*i;});var slope=(n*sxy-sx*sy)/(n*sx2-sx*sx);return{slope:slope,intercept:(sy-slope*sx)/n};}

function buildEvolSessSelIJ(){document.getElementById('evolSessSelIJ').innerHTML=PATIENT.entrenamiento.sesiones.map(function(s){return '<button class="sess-btn'+(s.id===evolActiveSessIJ?' active':'')+'" onclick="setEvolSessIJ(\''+s.id+'\',this)">'+s.icon+' '+s.label+'</button>';}).join('');}
function setEvolSessIJ(id,btn){evolActiveSessIJ=id;evolActiveExIJ=0;document.querySelectorAll('#evolSessSelIJ .sess-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');buildEvolExSelIJ();renderEvolChartIJ();}
function buildEvolExSelIJ(){var sess=PATIENT.entrenamiento.sesiones.find(function(s){return s.id===evolActiveSessIJ;});document.getElementById('evolExSelIJ').innerHTML=sess.ejercicios.map(function(ex,i){return '<button class="ex-pill'+(i===evolActiveExIJ?' active':'')+'" onclick="setEvolExIJ('+i+',this)">'+ex.nombre+'</button>';}).join('');}
function setEvolExIJ(idx,btn){evolActiveExIJ=idx;document.querySelectorAll('#evolExSelIJ .ex-pill').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderEvolChartIJ();}
function renderEvolChartIJ(){var sess=PATIENT.entrenamiento.sesiones.find(function(s){return s.id===evolActiveSessIJ;});var ex=sess.ejercicios[evolActiveExIJ];if($('evolChartTitleIJ'))$('evolChartTitleIJ').textContent=ex.nombre;var byWeek={};for(var i=0;i<localStorage.length;i++){var key=localStorage.key(i);if(!key)continue;var pat=new RegExp('^'+PATIENT.slug+'-train-s(\\d+)-'+sess.id+'-(\\d+)-s(\\d+)$');var m=key.match(pat);if(!m)continue;if(parseInt(m[2])!==evolActiveExIJ)continue;var val=parseFloat(localStorage.getItem(key));if(!val||isNaN(val))continue;if(!byWeek[m[1]])byWeek[m[1]]=[];byWeek[m[1]].push(val);}var lbl=WEEKS_IJ.map(function(w){return w.label;});var maxW=WEEKS_IJ.map(function(w){return byWeek[w.n]?Math.max.apply(null,byWeek[w.n]):null;});var hasData=maxW.some(function(v){return v!==null;});if(cTrainChartIJ){cTrainChartIJ.destroy();cTrainChartIJ=null;}var ctx=$('cTrainIJ');if(!ctx)return;var nd=document.querySelector('#evolChartCardIJ .no-data');if(nd)nd.remove();if(!hasData){ctx.style.display='none';var d=document.createElement('div');d.className='no-data';d.textContent='Aún no hay pesos registrados. Anótalos en la pestaña Entrenamiento.';document.getElementById('evolChartCardIJ').appendChild(d);return;}ctx.style.display='';cTrainChartIJ=new Chart(ctx,{type:'line',data:{labels:lbl,datasets:[{label:'Máximo kg',data:maxW,borderColor:'#C4973A',pointBackgroundColor:'#C4973A',tension:.35,pointRadius:5,borderWidth:2,fill:false,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:12,padding:14,color:'#888'}}},scales:{x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#666'}},y:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#666'},title:{display:true,text:'kg',color:'#555'}}}}});}
function init(){renderHero();renderTabs();renderNutr();renderEval();renderSpecs();}
init();
