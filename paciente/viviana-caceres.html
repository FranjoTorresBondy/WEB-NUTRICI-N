</style>

const $ = id => document.getElementById(id);
let saveTimer = null;

function renderHero() {

  $('heroNombre').innerHTML = PATIENT.nombre.replace('\n','<br>');

function renderTabs() {
  const tabs = [

      <span class="tnum">0${i+1}</span> ${t.label}

  }).join('');
  $('tabPanels').innerHTML = tabs.map((t,i) =>
    `<div id="tab-${t.id}" class="panel${i===0?' active':''}"></div>`
  ).join('');
}

function showTab(id,btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  $('tab-'+id)?.classList.add('active');
  btn.classList.add('active');
}

// ── Nutrición ──────────────────────────────────────────────────────────────
const MEAL_KEY = () => `${PATIENT.slug}-meals-v1`;
function getMealState() { try { const r=localStorage.getItem(MEAL_KEY()); return r?JSON.parse(r):{}; } catch { return {}; } }
function saveMealState(s) { localStorage.setItem(MEAL_KEY(), JSON.stringify(s)); flashSave(); }
let mealState = getMealState();

function renderNutr() {
  const m = PATIENT.macros;
  const macrosHtml = `<div class="macros">
    <span class="kcal">${m.kcal}<small> kcal / día base</small></span>
    <span class="mtag"><b>${m.p}g</b> Proteína</span>
    <span class="mtag"><b>${m.c}g</b> Carbohidratos</span>
    <span class="mtag"><b>${m.g}g</b> Grasas</span>
    <span class="sep"></span>
    <span class="tag">${PATIENT.tipoPlan}</span>
  </div>`;

  const mealsHtml = PATIENT.comidas.map(meal => buildMeal(meal)).join('');

  const entrHtml = PATIENT.entrenamiento ? `
  <section style="padding-top:0">
    <div class="sec-h"><span class="ix">02</span><h2>Días de entrenamiento</h2><div class="rule"></div></div>
    <div class="meals">
      ${PATIENT.entrenamiento.map(e => `
      <div class="meal">
        <div class="top">
          <div class="nm">${e.tipo} · Pre Entreno</div>
          <div class="mac"><b>+~100</b> kcal · ${e.timing}</div>
        </div>
        <div class="body">
          <div class="pick"><div class="k">Escoge 01</div>
            <div class="options">
              ${e.ops.map(op=>`<div class="opt" onclick="toggleOpt(this)"><span class="cb"></span><span class="opt-text">${op}</span></div>`).join('')}
            </div>
          </div>
        </div>
      </div>`).join('')}
    </div>
  </section>` : '';

  const hydroHtml = `
  <section style="padding-top:0">
    <div class="sec-h"><span class="ix">03</span><h2>Requerimientos hídricos</h2><div class="rule"></div></div>
    <div class="hydro">${PATIENT.hidratacion.map(h=>`<div class="hcard"><div class="l">${h.label}</div><div class="b">${h.valor} L</div></div>`).join('')}</div>
    <div class="note" style="margin-top:16px">No es necesario cumplir al 100% por ahora, pero sí que haya una mejora notable. Ingerir líquidos principalmente en la mañana y hasta no muy tarde para no interrumpir el sueño.</div>
  </section>`;

  $('tab-plan').innerHTML = `<div class="wrap">
    <section>
      <div class="sec-h"><span class="ix">01</span><h2>Plan alimentario</h2><div class="rule"></div></div>
      ${macrosHtml}
      <div class="meals">${mealsHtml}</div>
    </section>
    ${entrHtml}
    ${hydroHtml}
  </div>`;

  restoreMealUI();
}

function buildMeal(meal) {
  const groups = meal.grupos.map((g,gi) => {
    const opts = g.ops.map((op,oi) => {
      const key = `${meal.id}-${gi}-${oi}`;
      const cnt = (mealState[key]||0);
      const sel = cnt > 0;
      return `<div class="opt${sel?' selected':''}" data-key="${key}" data-max="${g.max}" data-gi="${gi}" data-mid="${meal.id}" onclick="toggleOpt(this)">
        <div class="cb">${sel?'✓':''}</div>
        <span class="opt-text">${op}</span>
        ${g.max>1?`<div class="opt-ctrl">
          <button class="opt-btn" onclick="event.stopPropagation();adjOpt(this,-1)" ${cnt<1?'disabled':''}>−</button>
          <span class="opt-cnt">${cnt||0}</span>
          <button class="opt-btn" onclick="event.stopPropagation();adjOpt(this,1)">+</button>
        </div>`:''}
      </div>`;
    }).join('');
    return `<div class="pick"><div class="k">${g.label}</div><div class="options">${opts}</div></div>`;
  }).join('');
  const nota = meal.nota ? `<div class="note2">${meal.nota}</div>` : '';
  return `<div class="meal"><div class="top">
    <span class="nm">${meal.nombre}</span>
    <span class="mac"><b>${meal.kcal}</b> kcal · ${meal.p}P / ${meal.c}C / ${meal.g}G</span>
  </div><div class="body">${groups}${nota}</div></div>`;
}

function toggleOpt(el) {
  if (!el.dataset.key) return;
  const key = el.dataset.key;
  const cur = mealState[key]||0;
  mealState[key] = cur>0 ? 0 : 1;
  saveMealState(mealState);
  renderNutr();
}

function adjOpt(btn, delta) {
  const opt = btn.closest('.opt');
  const key = opt.dataset.key;
  const cur = mealState[key]||0;
  mealState[key] = Math.max(0, cur+delta);
  saveMealState(mealState);
  renderNutr();
}

function restoreMealUI() {}

// ── Evaluación ─────────────────────────────────────────────────────────────

function renderSpecs() {
  const specsHtml = PATIENT.specs.map(s => {

// ── Evolución Física ───────────────────────────────────────────────────────
const ANTRO_KEY = () => `${PATIENT.slug}-antro-v1`;
function getAntroBase() {
  const a = PATIENT.antro;
  const s6 = +[a.tri,a.sub,a.supra,a.abd,a.pierna,a.pant].filter(Boolean).reduce((acc,v)=>acc+v,0).toFixed(1);
  const s8 = +(s6+(a.bi||0)+(a.cresta||0)).toFixed(1);
  return [{ fecha:a.fecha, peso:a.peso, tri:a.tri, bi:a.bi, sub:a.sub, cresta:a.cresta, supra:a.supra, abd:a.abd, pierna:a.pierna, pant:a.pant, brazRelaj:a.brazRelaj, brazFlex:a.brazFlex, abdom:a.abdom, cadera:a.cadera, muslo:a.muslo, pantPer:a.pantPer, s6, s8 }];
}
function getAntroData() { try { const r=localStorage.getItem(ANTRO_KEY()); return r?JSON.parse(r):getAntroBase(); } catch { return getAntroBase(); } }
function saveAntroData(d) { localStorage.setItem(ANTRO_KEY(), JSON.stringify(d)); }

let antroInited=false;
function initAntro() { if(antroInited)return; antroInited=true; renderAntro(); }

Chart.defaults.color='#666';
Chart.defaults.borderColor='rgba(255,255,255,0.07)';
Chart.defaults.font.family="'IBM Plex Mono',monospace";
Chart.defaults.font.size=11;
const CC={gold:'#C4973A',cyan:'#4fc3f7',coral:'#ef9a9a',green:'#a5d6a7',purple:'#ce93d8'};

function mkChart(id,labels,datasets) {
  const ctx=$(id); if(!ctx)return;
  if(ctx._ch)ctx._ch.destroy();
  ctx._ch=new Chart(ctx,{type:'line',data:{labels,datasets:datasets.map(d=>({tension:.35,pointRadius:5,borderWidth:2,fill:false,spanGaps:true,...d}))},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:12,padding:14,color:'#888'}},tooltip:{mode:'index',intersect:false}},
    scales:{x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#666'}},y:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#666'}}}}});
}

function renderAntro() {
  const el=$('tab-evol-antro'); if(!el)return;
  el.innerHTML=`<div class="wrap">
    <section style="padding-top:24px">
      <div class="sec-h"><span class="ix">01</span><h2>Evolución Antropométrica</h2><div class="rule"></div></div>
      <div class="kpi-row" id="antroKpis"></div>
    </section>
    <section style="padding-top:0">
      <div class="sec-h"><span class="ix">02</span><h2>Gráficos</h2><div class="rule"></div></div>
      <div class="chart-card"><h3>Peso corporal</h3><div class="cap">kg</div><div class="chart-wrap"><canvas id="cPeso"></canvas></div></div>
      <div class="chart-grid">
        <div class="chart-card"><h3>Sumatorias de pliegues</h3><div class="cap">Σ6 y Σ8 (mm)</div><div class="chart-wrap"><canvas id="cSigma"></canvas></div></div>
        <div class="chart-card"><h3>Perímetros musculares</h3><div class="cap">Brazo flex, muslo, pantorrilla (cm)</div><div class="chart-wrap"><canvas id="cMusc"></canvas></div></div>
        <div class="chart-card"><h3>Cintura y cadera</h3><div class="cap">Perímetros (cm)</div><div class="chart-wrap"><canvas id="cCint"></canvas></div></div>
        <div class="chart-card"><h3>Pliegues individuales</h3><div class="cap">Abdominal, cresta, subescapular (mm)</div><div class="chart-wrap"><canvas id="cPl"></canvas></div></div>
      </div>
    </section>
    <section style="padding-top:0">
      <div class="sec-h"><span class="ix">03</span><h2>Historial</h2><div class="rule"></div></div>
      <div class="tbl-scroll"><table class="antro-table" id="antroTable"></table></div>
    </section>
    <section style="padding-top:0">
      <div class="sec-h"><span class="ix">04</span><h2>Nueva medición</h2><div class="rule"></div></div>
      <div class="eval-form"><h3>Registrar evaluación</h3>
        <div class="form-grid">
          <div class="form-field"><label>Fecha</label><input type="date" id="f-fecha"></div>
          <div class="form-field"><label>Peso (kg)</label><input type="number" step="0.1" id="f-peso" placeholder="—"></div>
          <div class="form-field"><label>Tricipital (mm)</label><input type="number" step="0.5" id="f-tri"></div>
          <div class="form-field"><label>Bicipital (mm)</label><input type="number" step="0.5" id="f-bi"></div>
          <div class="form-field"><label>Subescapular</label><input type="number" step="0.5" id="f-sub"></div>
          <div class="form-field"><label>Cresta iliaca</label><input type="number" step="0.5" id="f-cresta"></div>
          <div class="form-field"><label>Supra espinal</label><input type="number" step="0.5" id="f-supra"></div>
          <div class="form-field"><label>Abdominal (mm)</label><input type="number" step="0.5" id="f-abd"></div>
          <div class="form-field"><label>Pierna media</label><input type="number" step="0.5" id="f-pierna"></div>
          <div class="form-field"><label>Pantorrilla pl.</label><input type="number" step="0.5" id="f-pant"></div>
          <div class="form-field"><label>Brazo relajado</label><input type="number" step="0.1" id="f-brazRelaj"></div>
          <div class="form-field"><label>Brazo flex.</label><input type="number" step="0.1" id="f-brazFlex"></div>
          <div class="form-field"><label>Cintura (cm)</label><input type="number" step="0.1" id="f-abdom"></div>
          <div class="form-field"><label>Cadera (cm)</label><input type="number" step="0.1" id="f-cadera"></div>
          <div class="form-field"><label>Muslo medio</label><input type="number" step="0.1" id="f-muslo"></div>
          <div class="form-field"><label>Pantorrilla per.</label><input type="number" step="0.1" id="f-pantPer"></div>
        </div>
        <button class="btn-add" onclick="addAntroEntry()">+ Guardar medición</button>
      </div>
    </section>
  </div>`;
  drawAntroCharts();
}

function drawAntroCharts() {
  const data=getAntroData(); const lbl=data.map(d=>d.fecha);
  const first=data[0],last=data[data.length-1];
  const kpis=[
    {v:last.peso??'—',u:'kg',l:'Peso actual',d:last.peso&&first.peso?+(last.peso-first.peso).toFixed(1):null,good:'down'},
    {v:last.s8??'—',u:'mm',l:'Σ8 pliegues',d:last.s8&&first.s8?+(last.s8-first.s8).toFixed(1):null,good:'down'},
    {v:last.brazFlex??'—',u:'cm',l:'Brazo flex.',d:last.brazFlex&&first.brazFlex?+(last.brazFlex-first.brazFlex).toFixed(1):null,good:'up'},
    {v:last.abdom??'—',u:'cm',l:'Cintura',d:last.abdom&&first.abdom?+(last.abdom-first.abdom).toFixed(1):null,good:'down'},
  ];
  $('antroKpis').innerHTML=kpis.map(k=>{
    const sign=k.d&&k.d>0?'+':''; const cls=k.d===null?'':(k.good==='down'?k.d<0:k.d>0)?'up':(k.d<0?'down':'');
    const arr=k.d===null?'—':(k.d>0?'▲':(k.d<0?'▼':'—'));
    return `<div class="kpi"><div class="kv">${k.v}<span style="font-size:14px;opacity:.5"> ${k.u}</span></div><div class="kl">${k.l}</div>${data.length>1&&k.d!==null?`<div class="kd ${cls}">${arr} ${sign}${k.d} ${k.u}</div>`:''}</div>`;
  }).join('');
  mkChart('cPeso',lbl,[{label:'Peso kg',data:data.map(d=>d.peso),borderColor:CC.gold,pointBackgroundColor:CC.gold}]);
  mkChart('cSigma',lbl,[{label:'Σ6',data:data.map(d=>d.s6),borderColor:CC.coral,pointBackgroundColor:CC.coral},{label:'Σ8',data:data.map(d=>d.s8),borderColor:CC.purple,pointBackgroundColor:CC.purple}]);
  mkChart('cMusc',lbl,[{label:'Brazo flex',data:data.map(d=>d.brazFlex),borderColor:CC.green,pointBackgroundColor:CC.green},{label:'Muslo',data:data.map(d=>d.muslo),borderColor:CC.cyan,pointBackgroundColor:CC.cyan},{label:'Pantorrilla',data:data.map(d=>d.pantPer),borderColor:CC.gold,pointBackgroundColor:CC.gold}]);
  mkChart('cCint',lbl,[{label:'Cintura',data:data.map(d=>d.abdom),borderColor:CC.coral,pointBackgroundColor:CC.coral},{label:'Cadera',data:data.map(d=>d.cadera),borderColor:CC.gold,pointBackgroundColor:CC.gold}]);
  mkChart('cPl',lbl,[{label:'Abdominal',data:data.map(d=>d.abd),borderColor:CC.coral,pointBackgroundColor:CC.coral},{label:'Cresta',data:data.map(d=>d.cresta),borderColor:CC.gold,pointBackgroundColor:CC.gold},{label:'Subescapular',data:data.map(d=>d.sub),borderColor:CC.cyan,pointBackgroundColor:CC.cyan}]);
  const cols=['fecha','peso','s6','s8','brazFlex','muslo','abdom','cadera'];
  const heads=['Fecha','Peso kg','Σ6 mm','Σ8 mm','Brazo cm','Muslo cm','Cintura cm','Cadera cm'];
  $('antroTable').innerHTML=`<thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`+[...data].reverse().map(d=>`<tr>${cols.map(c=>`<td>${d[c]??'—'}</td>`).join('')}</tr>`).join('')+'</tbody>';
}

function addAntroEntry() {
  const gf=id=>{const e=$(id);return e?e.value||null:null};
  const gn=id=>{const e=$(id);return e?parseFloat(e.value)||null:null};
  const fecha=gf('f-fecha'); if(!fecha){alert('Ingresa la fecha');return;}
  const e={fecha:fecha.split('-').reverse().join('.'),peso:gn('f-peso'),tri:gn('f-tri'),bi:gn('f-bi'),sub:gn('f-sub'),cresta:gn('f-cresta'),supra:gn('f-supra'),abd:gn('f-abd'),pierna:gn('f-pierna'),pant:gn('f-pant'),brazRelaj:gn('f-brazRelaj'),brazFlex:gn('f-brazFlex'),abdom:gn('f-abdom'),cadera:gn('f-cadera'),muslo:gn('f-muslo'),pantPer:gn('f-pantPer')};
  e.s6=+[e.tri,e.sub,e.supra,e.abd,e.pierna,e.pant].filter(Boolean).reduce((a,b)=>a+b,0).toFixed(1);
  e.s8=+(e.s6+(e.bi||0)+(e.cresta||0)).toFixed(1);
  const data=getAntroData(); data.push(e); saveAntroData(data);
  antroInited=false; initAntro();
  ['fecha','peso','tri','bi','sub','cresta','supra','abd','pierna','pant','brazRelaj','brazFlex','abdom','cadera','muslo','pantPer'].forEach(f=>{const el=$('f-'+f);if(el)el.value='';});
  flashSave();
}

function flashSave() {
  clearTimeout(saveTimer);
  const el=$('saveind'); el.classList.add('show'); $('saveTxt').textContent='Guardado';
  saveTimer=setTimeout(()=>el.classList.remove('show'),1800);
}

function init() {
  renderHero();
  renderTabs();
  renderNutr();
  renderEval();
  renderSpecs();
}

init();
</script>
